<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ticket System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #181818;
  --bg-alt:      #202020;
  --surface:     #2a2a2a;
  --surface2:    #333333;
  --text:        #f5f5f5;
  --text-muted:  #a0a0a0;
  --text-dim:    #6a6a6a;
  --border:      #333333;
  --accent:      #faff69;
  --accent-alt:  #ff6ec7;
  --success:     #b5e48c;
  --warning:     #ffa07a;
  --danger:      #ff6b6b;
  --blue:        #7bdff2;
  --purple:      #c7a9ff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-variant-numeric: tabular-nums; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.4;
}

/* ── Header ── */
header {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.header-sep { width: 1px; height: 20px; background: var(--border); }
.nav-link {
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
  padding: 4px 8px;
  border-radius: 4px;
}
.nav-link:hover { color: var(--text); background: var(--surface); }
.spacer { flex: 1; }
.btn {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  border: none;
  border-radius: 4px;
  padding: 5px 12px;
  cursor: pointer;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover:not(:disabled) { background: #eaef50; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: var(--surface2); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surface); }
.btn-danger-ghost { background: transparent; color: var(--danger); border: 1px solid #4a2020; }
.btn-danger-ghost:hover:not(:disabled) { background: #2a1515; }
.btn-violet { background: var(--accent-alt); color: #000; }
.btn-violet:hover:not(:disabled) { background: #e85fb0; }

/* ── Toolbar ── */
#toolbar {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
#toolbar input[type="text"] {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 5px 10px;
  flex: 1;
  min-width: 220px;
  outline: none;
}
#toolbar input[type="text"]::placeholder { color: var(--text-dim); }
#toolbar input[type="text"]:focus { border-color: var(--accent); }

/* ── Main ── */
main { padding: 0; }

/* ── Table ── */
.table-wrap {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
thead th {
  background: var(--bg-alt);
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 0 12px;
  height: 32px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 44px;
  white-space: nowrap;
  user-select: none;
}
thead th.num { text-align: right; }
thead th.check-col { width: 36px; padding: 0 8px; }
tbody tr { height: 30px; }
tbody tr:nth-child(even) td { background: var(--bg-alt); }
tbody tr:hover td { background: var(--surface) !important; }
tbody td {
  padding: 0 12px;
  border-bottom: 1px solid #1e1e1e;
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
tbody td.check-col { padding: 0 8px; }
tbody td.title-col { max-width: 340px; cursor: pointer; }
tbody td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
tbody tr:last-child td { border-bottom: none; }

input[type="checkbox"] {
  accent-color: var(--accent);
  width: 13px;
  height: 13px;
  cursor: pointer;
}

/* ── Title link ── */
.ticket-link { color: var(--text); text-decoration: none; font-weight: 500; }
.ticket-link:hover { color: var(--accent); }
.enriched-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--purple); margin-left: 5px; vertical-align: middle; }

/* ── Badges ── */
.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-radius: 3px;
  padding: 1px 5px;
  white-space: nowrap;
}
.s-open       { background: #0d2a3a; color: var(--blue); }
.s-in_progress{ background: #2a2500; color: var(--accent); }
.s-done       { background: #0d2a14; color: var(--success); }
.p-high       { background: #2a1212; color: var(--danger); }
.p-medium     { background: #2a1c0a; color: var(--warning); }
.p-low        { background: #0d2a14; color: var(--success); }
.i-critical   { color: var(--accent-alt); }
.i-high       { color: var(--danger); }
.i-medium     { color: var(--warning); }
.i-low        { color: var(--success); }
.val-pass     { color: var(--success); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.val-fail     { color: var(--danger); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.val-none     { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.label-chip   { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); background: var(--surface2); border-radius: 3px; padding: 1px 5px; margin-right: 2px; }
.repo-chip    { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }

/* ── Action row ── */
.action-btns { display: flex; gap: 4px; align-items: center; }
.btn-xs {
  font-family: inherit;
  font-size: 11px;
  border-radius: 3px;
  padding: 2px 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
}
.btn-xs:hover { background: var(--surface); color: var(--text); }
.btn-xs.enrich { color: var(--purple); border-color: #3d2e5a; }
.btn-xs.enrich:hover { background: #221833; }
.btn-xs.del { color: var(--danger); border-color: #3a1515; }
.btn-xs.del:hover { background: #1e0f0f; }
.btn-xs:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Empty state ── */
.empty {
  text-align: center;
  color: var(--text-dim);
  padding: 64px 0;
  font-size: 13px;
}
.empty strong { display: block; font-size: 15px; color: var(--text-muted); margin-bottom: 6px; }

/* ── Spinner ── */
.spinner {
  display: inline-block;
  width: 10px; height: 10px;
  border: 1.5px solid rgba(250,255,105,.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .5s linear infinite;
  margin-right: 5px;
  vertical-align: middle;
}
.spinner.dark {
  border-color: rgba(199,169,255,.2);
  border-top-color: var(--purple);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 12px;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
  z-index: 9999;
}
#toast.show { opacity: 1; }
#toast.error { background: #2a1212; border-color: var(--danger); color: var(--danger); }
#toast.ok { border-left: 3px solid var(--success); }

/* ── Modals ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 24px;
  width: 500px;
  max-width: 95vw;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
}
.modal h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
.modal label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-dim);
  margin-top: 14px;
  margin-bottom: 4px;
}
.modal input[type="text"],
.modal textarea,
.modal select {
  width: 100%;
  font-family: inherit;
  font-size: 13px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 7px 10px;
  outline: none;
}
.modal input[type="text"]:focus,
.modal textarea:focus,
.modal select:focus { border-color: var(--accent); }
.modal input[type="text"]::placeholder,
.modal textarea::placeholder { color: var(--text-dim); }
.modal textarea { resize: vertical; min-height: 70px; font-family: inherit; }
.modal select option { background: var(--bg-alt); }
.modal-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* ── Stat bar ── */
#stat-bar {
  padding: 6px 20px;
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  gap: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.stat-item { display: flex; gap: 5px; align-items: center; }
.stat-val { color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <span class="logo">⬡ Ticket System</span>
  <div class="header-sep"></div>
  <a href="/logs" class="nav-link">Logs</a>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="openBatchCreate()">Batch Create</button>
  <button class="btn btn-primary" onclick="openCreate()">+ New Ticket</button>
</header>

<div id="toolbar">
  <input id="repo-input" type="text" placeholder="Repo path (../my-project) or GitHub URL" style="flex:2" />
  <button class="btn btn-primary" id="generate-btn" onclick="generateTickets()">Generate from Repo</button>
  <div class="header-sep"></div>
  <button class="btn btn-violet" id="enrich-all-btn" onclick="enrichAll()">✦ Enrich Selected</button>
</div>

<div id="stat-bar">
  <span class="stat-item">Tickets: <span class="stat-val" id="stat-total">—</span></span>
  <span class="stat-item">Open: <span class="stat-val" id="stat-open">—</span></span>
  <span class="stat-item">Validated: <span class="stat-val" id="stat-validated">—</span></span>
  <span class="stat-item">Pass rate: <span class="stat-val" id="stat-passrate">—</span></span>
</div>

<main>
  <div class="table-wrap">
    <div id="ticket-container"></div>
  </div>
</main>

<!-- Create/Edit modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">New Ticket</h2>
    <input type="hidden" id="modal-id" />
    <label>Title *</label>
    <input id="f-title" type="text" placeholder="Short, actionable title" />
    <label>Business Requirement</label>
    <textarea id="f-business-req" style="min-height:56px" placeholder="The business need this ticket addresses"></textarea>
    <label>Stakeholder</label>
    <input id="f-stakeholder" type="text" placeholder="e.g. Product, Engineering, Customer" />
    <label>User Story</label>
    <textarea id="f-user-story" style="min-height:56px" placeholder="As a <role>, I want <goal> so that <benefit>"></textarea>
    <label>Description</label>
    <textarea id="f-desc" placeholder="What needs to be done? Leave blank — Enrich will fill it."></textarea>
    <p class="modal-hint">Leave blank and use ✦ Enrich to let AI fill this in.</p>
    <label>Status</label>
    <select id="f-status">
      <option value="open">Open</option>
      <option value="in_progress">In Progress</option>
      <option value="done">Done</option>
    </select>
    <label>Priority</label>
    <select id="f-priority">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <label>Importance</label>
    <select id="f-importance">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
    <label>Labels (comma-separated)</label>
    <input id="f-labels" type="text" placeholder="bug, feature, docs" />
    <label>Source Repo</label>
    <input id="f-repo" type="text" placeholder="../my-project or https://github.com/..." />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitTicket()">Save</button>
    </div>
  </div>
</div>

<!-- Batch Create modal -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal">
    <h2>Batch Create Tickets</h2>
    <label>Ticket titles — one per line</label>
    <textarea id="batch-titles" style="min-height:140px;font-family:'JetBrains Mono',monospace;font-size:12px" placeholder="Fix login bug&#10;Add dark mode&#10;Improve test coverage&#10;Update API docs"></textarea>
    <label>Source Repo (optional)</label>
    <input id="batch-repo" type="text" placeholder="../my-project or https://github.com/..." />
    <p class="modal-hint">Descriptions will be empty — run ✦ Enrich after to let AI fill them in.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeBatchModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitBatch()">Create All</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api';
let enrichingIds = new Set();
let currentTickets = [];

// ── Data ─────────────────────────────────────────────────────────────────────

async function loadTickets() {
  const res = await fetch(`${API}/tickets`);
  currentTickets = await res.json();
  renderTable(currentTickets);
  updateStats(currentTickets);
}

function updateStats(tickets) {
  document.getElementById('stat-total').textContent = tickets.length;
  document.getElementById('stat-open').textContent = tickets.filter(t => t.status === 'open').length;
  const validated = tickets.filter(t => t.validation_passed !== null && t.validation_passed !== undefined);
  const passed = tickets.filter(t => t.validation_passed === true);
  document.getElementById('stat-validated').textContent = validated.length;
  document.getElementById('stat-passrate').textContent = validated.length
    ? Math.round(passed.length / validated.length * 100) + '%' : '—';
}

async function generateTickets() {
  const source = document.getElementById('repo-input').value.trim();
  if (!source) { toast('Enter a repo path or GitHub URL', true); return; }
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  try {
    const body = source.startsWith('http') ? { repo_url: source } : { repo_path: source };
    const res = await fetch(`${API}/agents/create-from-repo`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const tickets = await res.json();
    toast(`Created ${tickets.length} ticket(s)`, false);
    loadTickets();
  } catch(e) { toast('Failed: ' + e.message, true); }
  finally { btn.disabled = false; btn.textContent = 'Generate from Repo'; }
}

async function enrichAll() {
  const globalSource = document.getElementById('repo-input').value.trim();
  const checked = [...document.querySelectorAll('.row-check:checked')].map(el => el.dataset.id);
  const btn = document.getElementById('enrich-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enriching…';
  try {
    const body = {};
    if (globalSource) {
      if (globalSource.startsWith('http')) body.repo_url = globalSource;
      else body.repo_path = globalSource;
    }
    if (checked.length) body.ticket_ids = checked;
    const res = await fetch(`${API}/agents/enrich-batch`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const tickets = await res.json();
    toast(`Enriched ${tickets.length} ticket(s)`, false);
    loadTickets();
  } catch(e) { toast('Enrich failed: ' + e.message, true); }
  finally { btn.disabled = false; btn.innerHTML = '✦ Enrich Selected'; }
}

async function enrichTicket(id, fallbackSource) {
  const source = document.getElementById('repo-input').value.trim() || fallbackSource || '';
  enrichingIds.add(id);
  setEnrichLoading(id, true);
  try {
    const body = source.startsWith('http') ? { repo_url: source } : (source ? { repo_path: source } : {});
    const res = await fetch(`${API}/agents/enrich/${id}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    toast('Enriched', false);
    loadTickets();
  } catch(e) { toast('Enrich failed: ' + e.message, true); }
  finally { enrichingIds.delete(id); setEnrichLoading(id, false); }
}

async function deleteTicket(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  const res = await fetch(`${API}/tickets/${id}`, { method: 'DELETE' });
  if (res.ok) { toast('Deleted'); loadTickets(); }
  else toast('Delete failed', true);
}

// ── Create / Edit modal ───────────────────────────────────────────────────────

function openCreate() {
  document.getElementById('modal-title').textContent = 'New Ticket';
  document.getElementById('modal-id').value = '';
  ['f-title','f-business-req','f-stakeholder','f-user-story','f-desc','f-labels','f-repo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'open';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-importance').value = 'medium';
  document.getElementById('modal').classList.add('open');
}

function openEdit(t) {
  document.getElementById('modal-title').textContent = 'Edit Ticket';
  document.getElementById('modal-id').value = t.id;
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-business-req').value = t.business_req || '';
  document.getElementById('f-stakeholder').value = t.stakeholder || '';
  document.getElementById('f-user-story').value = t.user_story || '';
  document.getElementById('f-desc').value = t.description || '';
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-importance').value = t.importance || 'medium';
  document.getElementById('f-labels').value = (t.labels || []).join(', ');
  document.getElementById('f-repo').value = t.source_repo || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function submitTicket() {
  const id = document.getElementById('modal-id').value;
  const payload = {
    title: document.getElementById('f-title').value.trim(),
    business_req: document.getElementById('f-business-req').value.trim(),
    stakeholder: document.getElementById('f-stakeholder').value.trim(),
    user_story: document.getElementById('f-user-story').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    importance: document.getElementById('f-importance').value,
    labels: document.getElementById('f-labels').value.split(',').map(s=>s.trim()).filter(Boolean),
    source_repo: document.getElementById('f-repo').value.trim(),
  };
  if (!payload.title) { toast('Title is required', true); return; }
  const url = id ? `${API}/tickets/${id}` : `${API}/tickets`;
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if (res.ok) { closeModal(); toast(id ? 'Updated' : 'Created'); loadTickets(); }
  else toast('Save failed', true);
}

// ── Batch Create modal ────────────────────────────────────────────────────────

function openBatchCreate() {
  document.getElementById('batch-titles').value = '';
  document.getElementById('batch-repo').value = '';
  document.getElementById('batch-modal').classList.add('open');
}
function closeBatchModal() { document.getElementById('batch-modal').classList.remove('open'); }

async function submitBatch() {
  const raw = document.getElementById('batch-titles').value;
  const titles = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!titles.length) { toast('Enter at least one title', true); return; }
  const repo_path = document.getElementById('batch-repo').value.trim() || undefined;
  const body = { titles };
  if (repo_path) body.repo_path = repo_path;
  const res = await fetch(`${API}/agents/create-batch`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (res.ok) {
    const tickets = await res.json();
    closeBatchModal();
    toast(`Created ${tickets.length} ticket(s)`);
    loadTickets();
  } else toast('Batch create failed', true);
}

// ── Table rendering ───────────────────────────────────────────────────────────

function renderTable(tickets) {
  const el = document.getElementById('ticket-container');
  if (!tickets.length) {
    el.innerHTML = '<div class="empty"><strong>No tickets yet</strong>Generate from a repo, batch create, or add one manually.</div>';
    return;
  }

  const rows = tickets.map(t => {
    const enrichedDot = (t.acceptance_criteria && t.acceptance_criteria.length) ? '<span class="enriched-dot" title="Enriched"></span>' : '';
    const valCell = t.validation_passed === true
      ? `<span class="val-pass">✓ ${pct(t.validation_score)}</span>`
      : t.validation_passed === false
        ? `<span class="val-fail">✗ ${pct(t.validation_score)}</span>`
        : '<span class="val-none">—</span>';
    const labels = (t.labels||[]).map(l=>`<span class="label-chip">${esc(l)}</span>`).join('');
    const repo = t.source_repo
      ? `<span class="repo-chip" title="${esc(t.source_repo)}">${repoShort(t.source_repo)}</span>`
      : '';
    const safeSource = esc(t.source_repo || '').replace(/'/g, "\\'");
    const imp = t.importance || 'medium';
    return `<tr>
      <td class="check-col"><input type="checkbox" class="row-check" data-id="${t.id}"></td>
      <td class="title-col" style="max-width:300px">
        <a href="/tickets/${t.id}" class="ticket-link">${esc(t.title)}${enrichedDot}</a>
        ${repo ? `<br><span style="margin-top:1px;display:block">${repo}</span>` : ''}
      </td>
      <td><span class="badge s-${t.status}">${t.status.replace('_',' ')}</span></td>
      <td><span class="badge p-${t.priority}">${t.priority}</span></td>
      <td><span class="i-${imp}" style="font-size:11px;font-weight:500">${imp}</span></td>
      <td class="num">${valCell}</td>
      <td>${labels}</td>
      <td class="num" style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px">${fmtDate(t.created_at)}</td>
      <td>
        <div class="action-btns">
          <button class="btn-xs" onclick='openEdit(${JSON.stringify(t)})'>Edit</button>
          <button class="btn-xs enrich" id="enrich-btn-${t.id}" onclick="enrichTicket('${t.id}','${safeSource}')" ${enrichingIds.has(t.id)?'disabled':''}>
            ${enrichingIds.has(t.id)?'<span class="spinner dark"></span>…':'✦ Enrich'}
          </button>
          <button class="btn-xs del" onclick="deleteTicket('${t.id}','${esc(t.title).replace(/'/g,"\\'")}')">Del</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table>
    <thead><tr>
      <th class="check-col"><input type="checkbox" id="select-all" onchange="toggleAll(this)" title="Select all"></th>
      <th>Title</th>
      <th>Status</th>
      <th>Priority</th>
      <th>Importance</th>
      <th class="num">Validation</th>
      <th>Labels</th>
      <th class="num">Created</th>
      <th>Actions</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleAll(master) {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = master.checked; });
}

function setEnrichLoading(id, loading) {
  const btn = document.getElementById(`enrich-btn-${id}`);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner dark"></span>…' : '✦ Enrich';
}

function pct(score) {
  return score !== null && score !== undefined ? Math.round(score * 100) + '%' : '—';
}

function repoShort(s) {
  if (!s) return '';
  if (s.startsWith('http')) {
    try {
      const parts = new URL(s).pathname.split('/').filter(Boolean);
      return '⎇ ' + (parts.length >= 2 ? parts.slice(-2).join('/') : s);
    } catch { return s; }
  }
  return '📁 ' + s.split('/').pop();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) { return s ? new Date(s).toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}) : '—'; }

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : ' ok');
  setTimeout(() => el.className = '', 3000);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
document.getElementById('batch-modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeBatchModal(); });
loadTickets();
</script>
</body>
</html>
