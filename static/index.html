<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ticket System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; color: #222; }

  /* ── Header ── */
  header { background: #1a1a2e; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 1.2rem; font-weight: 600; flex: 1; }
  header a.nav-link { color: #a5b4fc; text-decoration: none; font-size: 0.85rem; padding: 6px 10px; border-radius: 5px; }
  header a.nav-link:hover { background: rgba(255,255,255,.1); color: #fff; }
  header button { background: #4f46e5; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 0.85rem; }
  header button:hover { background: #4338ca; }
  header button.btn-outline-white { background: transparent; border: 1px solid rgba(255,255,255,.3); color: #fff; }
  header button.btn-outline-white:hover { background: rgba(255,255,255,.1); }

  /* ── Repo panel ── */
  #repo-panel { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  #repo-panel input { flex: 1; min-width: 200px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 7px 10px; font-size: 0.9rem; }
  #repo-panel button { border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
  #repo-panel button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-teal { background: #0f766e; color: #fff; }
  .btn-teal:hover { background: #0d6662; }
  .btn-violet { background: #7c3aed; color: #fff; }
  .btn-violet:hover { background: #6d28d9; }
  .btn-slate { background: #475569; color: #fff; }
  .btn-slate:hover { background: #334155; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
  #toast.show { opacity: 1; }
  #toast.error { background: #dc2626; }

  /* ── Main layout ── */
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  th { background: #f8fafc; text-align: left; padding: 10px 12px; font-size: 0.78rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #e2e8f0; }
  th.check-col { width: 36px; }
  td { padding: 10px 12px; font-size: 0.88rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .title-cell { cursor: pointer; }
  .title-cell strong:hover { color: #4f46e5; text-decoration: underline; }

  /* ── Badges ── */
  .badge { display: inline-block; border-radius: 4px; padding: 2px 7px; font-size: 0.75rem; font-weight: 600; }
  .status-open { background: #dbeafe; color: #1d4ed8; }
  .status-in_progress { background: #fef3c7; color: #92400e; }
  .status-done { background: #d1fae5; color: #065f46; }
  .priority-high { background: #fee2e2; color: #991b1b; }
  .priority-medium { background: #ffedd5; color: #9a3412; }
  .priority-low { background: #f0fdf4; color: #166534; }
  .label { background: #e0e7ff; color: #3730a3; border-radius: 3px; padding: 1px 5px; font-size: 0.72rem; margin-right: 3px; }
  .importance-critical { background: #7f1d1d; color: #fef2f2; }
  .importance-high { background: #fee2e2; color: #991b1b; }
  .importance-medium { background: #ffedd5; color: #9a3412; }
  .importance-low { background: #f0fdf4; color: #166534; }

  /* ── Repo chip ── */
  .repo-chip { display: inline-flex; align-items: center; gap: 3px; margin-top: 4px; font-size: 0.72rem; color: #64748b; background: #f1f5f9; border-radius: 3px; padding: 1px 6px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .repo-chip a { color: inherit; text-decoration: none; }
  .repo-chip a:hover { color: #4f46e5; }

  /* ── Action buttons ── */
  .actions { display: flex; gap: 5px; flex-wrap: wrap; }
  .btn-icon { background: none; border: 1px solid #e2e8f0; border-radius: 5px; padding: 4px 8px; cursor: pointer; font-size: 0.78rem; color: #475569; white-space: nowrap; }
  .btn-icon:hover { background: #f1f5f9; }
  .btn-icon.enrich { color: #7c3aed; border-color: #c4b5fd; }
  .btn-icon.enrich:hover { background: #ede9fe; }
  .btn-icon.danger { color: #dc2626; border-color: #fecaca; }
  .btn-icon.danger:hover { background: #fef2f2; }
  .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty { text-align: center; color: #94a3b8; padding: 48px 0; font-size: 0.95rem; }

  /* ── Modals ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal h2 { font-size: 1.05rem; margin-bottom: 18px; }
  .modal label { display: block; font-size: 0.8rem; color: #64748b; margin-bottom: 3px; margin-top: 12px; }
  .modal .hint { font-size: 0.72rem; color: #94a3b8; margin-top: 2px; }
  .modal input, .modal textarea, .modal select { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 7px 10px; font-size: 0.9rem; font-family: inherit; }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .modal-actions button { border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; font-size: 0.88rem; }
  .btn-cancel { background: #f1f5f9; color: #475569; }
  .btn-cancel:hover { background: #e2e8f0; }
  .btn-submit { background: #4f46e5; color: #fff; }
  .btn-submit:hover { background: #4338ca; }

  /* ── Spinner ── */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle; }
  .spinner.dark { border-color: rgba(79,70,229,.2); border-top-color: #4f46e5; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>Agent Ticket System</h1>
  <a href="/logs" class="nav-link">📋 Logs</a>
  <button class="btn-outline-white" onclick="openBatchCreate()">Batch Create</button>
  <button onclick="openCreate()">+ New Ticket</button>
</header>

<div id="repo-panel">
  <input id="repo-input" type="text" placeholder="Local path (e.g. ../linkedin-skill) or GitHub URL" />
  <button class="btn-teal" id="generate-btn" onclick="generateTickets()">Generate from Repo</button>
  <button class="btn-violet" id="enrich-all-btn" onclick="enrichAll()">✨ Enrich Selected</button>
</div>

<main>
  <div id="ticket-container"></div>
</main>

<!-- Create/Edit modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="width:520px;max-height:90vh;overflow-y:auto">
    <h2 id="modal-title">New Ticket</h2>
    <input type="hidden" id="modal-id" />
    <label>Title *</label>
    <input id="f-title" type="text" placeholder="Short, actionable title" />
    <label>Business Requirement</label>
    <textarea id="f-business-req" style="min-height:60px" placeholder="The business need this addresses"></textarea>
    <label>Stakeholder</label>
    <input id="f-stakeholder" type="text" placeholder="e.g. Product, Engineering, Customer" />
    <label>User Story</label>
    <textarea id="f-user-story" style="min-height:60px" placeholder="As a <role>, I want <goal> so that <benefit>"></textarea>
    <label>Description</label>
    <textarea id="f-desc" placeholder="What needs to be done? (optional — AI can generate this via Enrich)"></textarea>
    <p class="hint">Leave blank and use ✨ Enrich to let AI fill this in.</p>
    <label>Status</label>
    <select id="f-status">
      <option value="open">Open</option>
      <option value="in_progress">In Progress</option>
      <option value="done">Done</option>
    </select>
    <label>Priority</label>
    <select id="f-priority">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <label>Importance</label>
    <select id="f-importance">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
    <label>Labels (comma-separated)</label>
    <input id="f-labels" type="text" placeholder="bug, feature, docs" />
    <label>Source Repo</label>
    <input id="f-repo" type="text" placeholder="../my-project or https://github.com/..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitTicket()">Save</button>
    </div>
  </div>
</div>

<!-- Batch Create modal -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal">
    <h2>Batch Create Tickets</h2>
    <label>Ticket titles (one per line)</label>
    <textarea id="batch-titles" style="min-height:160px" placeholder="Fix login bug&#10;Add dark mode&#10;Improve test coverage&#10;Update API docs"></textarea>
    <label>Source Repo (optional)</label>
    <input id="batch-repo" type="text" placeholder="../my-project or https://github.com/..." />
    <p class="hint">Descriptions will be empty — run ✨ Enrich after to let AI fill them in.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeBatchModal()">Cancel</button>
      <button class="btn-submit" onclick="submitBatch()">Create All</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api';
let enrichingIds = new Set();
let currentTickets = [];

// ── Data ─────────────────────────────────────────────────────────────────────

async function loadTickets() {
  const res = await fetch(`${API}/tickets`);
  currentTickets = await res.json();
  renderTable(currentTickets);
}

async function generateTickets() {
  const source = document.getElementById('repo-input').value.trim();
  if (!source) { toast('Enter a local path or GitHub URL', true); return; }
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  try {
    const body = source.startsWith('http') ? { repo_url: source } : { repo_path: source };
    const res = await fetch(`${API}/agents/create-from-repo`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const tickets = await res.json();
    toast(`Created ${tickets.length} ticket(s) from repo`);
    loadTickets();
  } catch(e) { toast('Failed: ' + e.message, true); }
  finally { btn.disabled = false; btn.textContent = 'Generate from Repo'; }
}

async function enrichAll() {
  const globalSource = document.getElementById('repo-input').value.trim();
  const checked = [...document.querySelectorAll('.row-check:checked')].map(el => el.dataset.id);
  const btn = document.getElementById('enrich-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enriching…';
  try {
    const body = {};
    if (globalSource) {
      if (globalSource.startsWith('http')) body.repo_url = globalSource;
      else body.repo_path = globalSource;
    }
    if (checked.length) body.ticket_ids = checked;
    const res = await fetch(`${API}/agents/enrich-batch`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const tickets = await res.json();
    toast(`Enriched ${tickets.length} ticket(s)`);
    loadTickets();
  } catch(e) { toast('Enrich failed: ' + e.message, true); }
  finally { btn.disabled = false; btn.innerHTML = '✨ Enrich Selected'; }
}

async function enrichTicket(id, fallbackSource) {
  const source = document.getElementById('repo-input').value.trim() || fallbackSource || '';
  enrichingIds.add(id);
  setEnrichLoading(id, true);
  try {
    const body = source.startsWith('http') ? { repo_url: source } : (source ? { repo_path: source } : {});
    const res = await fetch(`${API}/agents/enrich/${id}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    toast('Ticket enriched');
    loadTickets();
  } catch(e) { toast('Enrich failed: ' + e.message, true); }
  finally { enrichingIds.delete(id); setEnrichLoading(id, false); }
}

async function deleteTicket(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  const res = await fetch(`${API}/tickets/${id}`, { method: 'DELETE' });
  if (res.ok) { toast('Ticket deleted'); loadTickets(); }
  else toast('Delete failed', true);
}

// ── Create / Edit modal ───────────────────────────────────────────────────────

function openCreate() {
  document.getElementById('modal-title').textContent = 'New Ticket';
  document.getElementById('modal-id').value = '';
  ['f-title','f-business-req','f-stakeholder','f-user-story','f-desc','f-labels','f-repo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'open';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-importance').value = 'medium';
  document.getElementById('modal').classList.add('open');
}

function openEdit(t) {
  document.getElementById('modal-title').textContent = 'Edit Ticket';
  document.getElementById('modal-id').value = t.id;
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-business-req').value = t.business_req || '';
  document.getElementById('f-stakeholder').value = t.stakeholder || '';
  document.getElementById('f-user-story').value = t.user_story || '';
  document.getElementById('f-desc').value = t.description || '';
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-importance').value = t.importance || 'medium';
  document.getElementById('f-labels').value = (t.labels || []).join(', ');
  document.getElementById('f-repo').value = t.source_repo || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function submitTicket() {
  const id = document.getElementById('modal-id').value;
  const payload = {
    title: document.getElementById('f-title').value.trim(),
    business_req: document.getElementById('f-business-req').value.trim(),
    stakeholder: document.getElementById('f-stakeholder').value.trim(),
    user_story: document.getElementById('f-user-story').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    importance: document.getElementById('f-importance').value,
    labels: document.getElementById('f-labels').value.split(',').map(s=>s.trim()).filter(Boolean),
    source_repo: document.getElementById('f-repo').value.trim(),
  };
  if (!payload.title) { toast('Title is required', true); return; }
  const url = id ? `${API}/tickets/${id}` : `${API}/tickets`;
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if (res.ok) { closeModal(); toast(id ? 'Ticket updated' : 'Ticket created'); loadTickets(); }
  else toast('Save failed', true);
}

// ── Batch Create modal ────────────────────────────────────────────────────────

function openBatchCreate() {
  document.getElementById('batch-titles').value = '';
  document.getElementById('batch-repo').value = '';
  document.getElementById('batch-modal').classList.add('open');
}
function closeBatchModal() { document.getElementById('batch-modal').classList.remove('open'); }

async function submitBatch() {
  const raw = document.getElementById('batch-titles').value;
  const titles = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!titles.length) { toast('Enter at least one title', true); return; }
  const repo_path = document.getElementById('batch-repo').value.trim() || undefined;
  const body = { titles };
  if (repo_path) body.repo_path = repo_path;
  const res = await fetch(`${API}/agents/create-batch`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (res.ok) {
    const tickets = await res.json();
    closeBatchModal();
    toast(`Created ${tickets.length} ticket(s)`);
    loadTickets();
  } else toast('Batch create failed', true);
}

// ── Table rendering ───────────────────────────────────────────────────────────

function renderTable(tickets) {
  const el = document.getElementById('ticket-container');
  if (!tickets.length) {
    el.innerHTML = '<div class="empty">No tickets yet — create one or generate from a repo.</div>';
    return;
  }

  const rows = tickets.map(t => {
    const repoChip = t.source_repo
      ? `<div class="repo-chip" title="${esc(t.source_repo)}">
           ${t.source_repo.startsWith('http') ? '⎇' : '📁'}
           ${t.source_repo.startsWith('http')
             ? `<a href="${esc(t.source_repo)}" target="_blank" rel="noopener">${repoLabel(t.source_repo)}</a>`
             : esc(t.source_repo)}
         </div>`
      : '';

    const validCell = t.validation_passed === true
      ? `<span style="color:#10b981;font-size:.85rem" title="Score: ${Math.round((t.validation_score||0)*100)}%">✅ ${Math.round((t.validation_score||0)*100)}%</span>`
      : t.validation_passed === false
        ? `<span style="color:#dc2626;font-size:.85rem" title="Score: ${Math.round((t.validation_score||0)*100)}%">❌ ${Math.round((t.validation_score||0)*100)}%</span>`
        : '<span style="color:#94a3b8;font-size:.8rem">—</span>';

    const safeSource = esc(t.source_repo || '').replace(/'/g, "\\'");
    return `<tr>
      <td><input type="checkbox" class="row-check" data-id="${t.id}"></td>
      <td class="title-cell">
        <a href="/tickets/${t.id}" style="text-decoration:none;color:inherit">
          <strong>${esc(t.title)}</strong>${enrichedBadge(t)}
        </a>
        ${repoChip}
      </td>
      <td><span class="badge status-${t.status}">${t.status.replace('_',' ')}</span></td>
      <td><span class="badge priority-${t.priority}">${t.priority}</span></td>
      <td><span class="badge importance-${t.importance||'medium'}">${t.importance||'medium'}</span></td>
      <td>${validCell}</td>
      <td>${(t.labels||[]).map(l=>`<span class="label">${esc(l)}</span>`).join('')}</td>
      <td style="color:#94a3b8;font-size:.8rem;white-space:nowrap">${fmtDate(t.created_at)}</td>
      <td class="actions">
        <button class="btn-icon" onclick='openEdit(${JSON.stringify(t)})'>✏️ Edit</button>
        <button class="btn-icon enrich" id="enrich-btn-${t.id}" onclick="enrichTicket('${t.id}','${safeSource}')" ${enrichingIds.has(t.id)?'disabled':''}>
          ${enrichingIds.has(t.id)?'<span class="spinner dark"></span>Enriching…':'✨ Enrich'}
        </button>
        <button class="btn-icon danger" onclick="deleteTicket('${t.id}','${esc(t.title).replace(/'/g,"\\'")}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table>
    <thead><tr>
      <th class="check-col"><input type="checkbox" id="select-all" onchange="toggleAll(this)" title="Select all"></th>
      <th>Title / Repo</th><th>Status</th><th>Priority</th><th>Importance</th><th>Validation</th><th>Labels</th><th>Created</th><th>Actions</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleAll(master) {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = master.checked; });
}

function setEnrichLoading(id, loading) {
  const btn = document.getElementById(`enrich-btn-${id}`);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner dark"></span>Enriching…' : '✨ Enrich';
}

function enrichedBadge(t) {
  return (t.acceptance_criteria && t.acceptance_criteria.length)
    ? ' <span style="font-size:.7rem;color:#7c3aed;margin-left:4px">✨</span>' : '';
}

function repoLabel(url) {
  try {
    const parts = new URL(url).pathname.split('/').filter(Boolean);
    return parts.length >= 2 ? parts.slice(-2).join('/') : url;
  } catch { return url; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) { return s ? new Date(s).toLocaleDateString() : '—'; }

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
document.getElementById('batch-modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeBatchModal(); });
loadTickets();
</script>
</body>
</html>
