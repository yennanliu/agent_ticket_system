<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ticket System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; color: #222; }

  header { background: #1a1a2e; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.2rem; font-weight: 600; flex: 1; }
  header button { background: #4f46e5; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 0.85rem; }
  header button:hover { background: #4338ca; }

  #repo-panel { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 24px; display: flex; gap: 10px; align-items: center; }
  #repo-panel input { flex: 1; border: 1px solid #cbd5e1; border-radius: 6px; padding: 7px 10px; font-size: 0.9rem; }
  #repo-panel button { background: #0f766e; color: #fff; border: none; border-radius: 6px; padding: 7px 16px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
  #repo-panel button:hover { background: #0d6662; }
  #repo-panel button:disabled { opacity: 0.5; cursor: not-allowed; }

  #toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
  #toast.show { opacity: 1; }
  #toast.error { background: #dc2626; }

  main { padding: 24px; max-width: 1100px; margin: 0 auto; }

  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  th { background: #f8fafc; text-align: left; padding: 10px 14px; font-size: 0.78rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #e2e8f0; }
  td { padding: 11px 14px; font-size: 0.88rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .badge { display: inline-block; border-radius: 4px; padding: 2px 7px; font-size: 0.75rem; font-weight: 600; }
  .status-open { background: #dbeafe; color: #1d4ed8; }
  .status-in_progress { background: #fef3c7; color: #92400e; }
  .status-done { background: #d1fae5; color: #065f46; }
  .priority-high { background: #fee2e2; color: #991b1b; }
  .priority-medium { background: #ffedd5; color: #9a3412; }
  .priority-low { background: #f0fdf4; color: #166534; }
  .label { background: #e0e7ff; color: #3730a3; border-radius: 3px; padding: 1px 5px; font-size: 0.72rem; margin-right: 3px; }

  .actions { display: flex; gap: 6px; }
  .btn-icon { background: none; border: 1px solid #e2e8f0; border-radius: 5px; padding: 4px 8px; cursor: pointer; font-size: 0.8rem; color: #475569; }
  .btn-icon:hover { background: #f1f5f9; }
  .btn-icon.enrich { color: #7c3aed; border-color: #c4b5fd; }
  .btn-icon.enrich:hover { background: #ede9fe; }
  .btn-icon.danger { color: #dc2626; border-color: #fecaca; }
  .btn-icon.danger:hover { background: #fef2f2; }
  .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty { text-align: center; color: #94a3b8; padding: 48px 0; font-size: 0.95rem; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal h2 { font-size: 1.05rem; margin-bottom: 18px; }
  .modal label { display: block; font-size: 0.8rem; color: #64748b; margin-bottom: 3px; margin-top: 12px; }
  .modal input, .modal textarea, .modal select { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 7px 10px; font-size: 0.9rem; font-family: inherit; }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .modal-actions button { border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; font-size: 0.88rem; }
  .btn-cancel { background: #f1f5f9; color: #475569; }
  .btn-cancel:hover { background: #e2e8f0; }
  .btn-submit { background: #4f46e5; color: #fff; }
  .btn-submit:hover { background: #4338ca; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>Agent Ticket System</h1>
  <button onclick="openCreate()">+ New Ticket</button>
</header>

<div id="repo-panel">
  <input id="repo-input" type="text" placeholder="Local path (e.g. ../linkedin-skill) or GitHub URL" />
  <button id="generate-btn" onclick="generateTickets()">Generate from Repo</button>
</div>

<main>
  <div id="ticket-container"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">New Ticket</h2>
    <input type="hidden" id="modal-id" />
    <label>Title *</label>
    <input id="f-title" type="text" placeholder="Short, actionable title" />
    <label>Description *</label>
    <textarea id="f-desc" placeholder="What needs to be done?"></textarea>
    <label>Status</label>
    <select id="f-status">
      <option value="open">Open</option>
      <option value="in_progress">In Progress</option>
      <option value="done">Done</option>
    </select>
    <label>Priority</label>
    <select id="f-priority">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <label>Labels (comma-separated)</label>
    <input id="f-labels" type="text" placeholder="bug, feature, docs" />
    <label>Source Repo</label>
    <input id="f-repo" type="text" placeholder="../my-project or https://github.com/..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitTicket()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api';
let enrichingIds = new Set();

async function loadTickets() {
  const res = await fetch(`${API}/tickets`);
  const tickets = await res.json();
  renderTable(tickets);
}

async function generateTickets() {
  const source = document.getElementById('repo-input').value.trim();
  if (!source) { toast('Enter a local path or GitHub URL', true); return; }
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  try {
    const body = source.startsWith('http') ? { repo_url: source } : { repo_path: source };
    const res = await fetch(`${API}/agents/create-from-repo`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const tickets = await res.json();
    toast(`Created ${tickets.length} ticket(s) from repo`);
    loadTickets();
  } catch(e) {
    toast('Failed: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate from Repo';
  }
}

async function enrichTicket(id) {
  const source = document.getElementById('repo-input').value.trim();
  if (!source) { toast('Enter a local path or GitHub URL to enrich from', true); return; }
  enrichingIds.add(id);
  renderEnrichBtn(id, true);
  try {
    const body = source.startsWith('http') ? { repo_url: source } : { repo_path: source };
    const res = await fetch(`${API}/agents/enrich/${id}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    toast('Ticket enriched');
    loadTickets();
  } catch(e) {
    toast('Enrich failed: ' + e.message, true);
  } finally {
    enrichingIds.delete(id);
    renderEnrichBtn(id, false);
  }
}

async function deleteTicket(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  const res = await fetch(`${API}/tickets/${id}`, { method: 'DELETE' });
  if (res.ok) { toast('Ticket deleted'); loadTickets(); }
  else toast('Delete failed', true);
}

function openCreate() {
  document.getElementById('modal-title').textContent = 'New Ticket';
  document.getElementById('modal-id').value = '';
  ['f-title','f-desc','f-labels','f-repo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'open';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('modal').classList.add('open');
}

function openEdit(t) {
  document.getElementById('modal-title').textContent = 'Edit Ticket';
  document.getElementById('modal-id').value = t.id;
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-desc').value = t.description;
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-labels').value = (t.labels || []).join(', ');
  document.getElementById('f-repo').value = t.source_repo || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function submitTicket() {
  const id = document.getElementById('modal-id').value;
  const payload = {
    title: document.getElementById('f-title').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    labels: document.getElementById('f-labels').value.split(',').map(s=>s.trim()).filter(Boolean),
    source_repo: document.getElementById('f-repo').value.trim(),
  };
  if (!payload.title || !payload.description) { toast('Title and description are required', true); return; }
  const url = id ? `${API}/tickets/${id}` : `${API}/tickets`;
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if (res.ok) { closeModal(); toast(id ? 'Ticket updated' : 'Ticket created'); loadTickets(); }
  else toast('Save failed', true);
}

function renderTable(tickets) {
  const el = document.getElementById('ticket-container');
  if (!tickets.length) {
    el.innerHTML = '<div class="empty">No tickets yet — create one or generate from a repo.</div>';
    return;
  }
  const rows = tickets.map(t => {
    const tJson = JSON.stringify(t).replace(/'/g, "\\'");
    return `<tr>
      <td><strong>${esc(t.title)}</strong>${enrichedBadge(t)}</td>
      <td><span class="badge status-${t.status}">${t.status.replace('_',' ')}</span></td>
      <td><span class="badge priority-${t.priority}">${t.priority}</span></td>
      <td>${(t.labels||[]).map(l=>`<span class="label">${esc(l)}</span>`).join('')}</td>
      <td style="color:#94a3b8;font-size:.8rem">${fmtDate(t.created_at)}</td>
      <td class="actions" id="actions-${t.id}">
        <button class="btn-icon" onclick='openEdit(${JSON.stringify(t)})'>&#x270F;&#xFE0F; Edit</button>
        <button class="btn-icon enrich" id="enrich-btn-${t.id}" onclick="enrichTicket('${t.id}')">${enrichingIds.has(t.id)?'<span class="spinner"></span>Enriching…':'✨ Enrich'}</button>
        <button class="btn-icon danger" onclick="deleteTicket('${t.id}','${esc(t.title).replace(/'/g,"\\'")}')">🗑️ Delete</button>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table>
    <thead><tr><th>Title</th><th>Status</th><th>Priority</th><th>Labels</th><th>Created</th><th>Actions</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderEnrichBtn(id, loading) {
  const btn = document.getElementById(`enrich-btn-${id}`);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Enriching…' : '✨ Enrich';
}

function enrichedBadge(t) {
  return (t.acceptance_criteria && t.acceptance_criteria.length)
    ? ' <span style="font-size:.7rem;color:#7c3aed;margin-left:4px">✨ enriched</span>' : '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) { return s ? new Date(s).toLocaleDateString() : '—'; }

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
loadTickets();
</script>
</body>
</html>
