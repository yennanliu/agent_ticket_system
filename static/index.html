<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ticket System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Themes ─────────────────────────────────────────────────────────────── */
:root {
  --bg:          #181818;
  --bg-alt:      #202020;
  --surface:     #2a2a2a;
  --surface2:    #333333;
  --text:        #f5f5f5;
  --text-muted:  #b0b0b0;
  --text-dim:    #6a6a6a;
  --border:      #333333;
  --accent:      #faff69;
  --accent-fg:   #000;
  --accent-alt:  #ff6ec7;
  --accent-alt-fg: #000;
  --success:     #b5e48c;
  --warning:     #ffa07a;
  --danger:      #ff6b6b;
  --blue:        #7bdff2;
  --purple:      #c7a9ff;
  /* badge skins */
  --b-open-bg:   #0d2a3a; --b-open-fg:   #7bdff2;
  --b-prog-bg:   #2a2500; --b-prog-fg:   #faff69;
  --b-done-bg:   #0d2a14; --b-done-fg:   #b5e48c;
  --b-hi-bg:     #2a1212; --b-hi-fg:     #ff6b6b;
  --b-med-bg:    #2a1c0a; --b-med-fg:    #ffa07a;
  --b-lo-bg:     #0d2a14; --b-lo-fg:     #b5e48c;
  --b-crit-bg:   #2a0f2a; --b-crit-fg:   #ff6ec7;
  --b-chip-bg:   #333333; --b-chip-fg:   #b0b0b0;
  /* heights for sticky math */
  --h-header:    48px;
  --h-toolbar:   52px;
  --h-statbar:   34px;
}
[data-theme="light"] {
  --bg:          #efefef;
  --bg-alt:      #e4e4e4;
  --surface:     #d5d5d5;
  --surface2:    #c5c5c5;
  --text:        #141414;
  --text-muted:  #3a3a3a;
  --text-dim:    #6e6e6e;
  --border:      #b8b8b8;
  --accent:      #faff69;
  --accent-fg:   #000;
  --accent-alt:  #ff6ec7;
  --accent-alt-fg: #000;
  --success:     #b5e48c;
  --warning:     #ffa07a;
  --danger:      #ff6b6b;
  --blue:        #7bdff2;
  --purple:      #c7a9ff;
  --b-open-bg:   #0d2a3a; --b-open-fg:   #7bdff2;
  --b-prog-bg:   #2a2500; --b-prog-fg:   #faff69;
  --b-done-bg:   #0d2a14; --b-done-fg:   #b5e48c;
  --b-hi-bg:     #2a1212; --b-hi-fg:     #ff6b6b;
  --b-med-bg:    #2a1c0a; --b-med-fg:    #ffa07a;
  --b-lo-bg:     #0d2a14; --b-lo-fg:     #b5e48c;
  --b-crit-bg:   #2a0f2a; --b-crit-fg:   #ff6ec7;
  --b-chip-bg:   #333333; --b-chip-fg:   #b0b0b0;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-variant-numeric: tabular-nums; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.4;
  transition: background .2s, color .2s;
}

/* ── Header ── */
header {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: var(--h-header);
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.header-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.nav-link {
  font-size: 14px;
  color: var(--text-muted);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 4px;
}
.nav-link:hover { color: var(--text); background: var(--surface); }
.spacer { flex: 1; }

.btn {
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  border: none;
  border-radius: 4px;
  padding: 6px 14px;
  cursor: pointer;
  white-space: nowrap;
  line-height: 1.2;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: var(--accent-fg); }
.btn-primary:hover:not(:disabled) { filter: brightness(0.92); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: var(--surface2); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surface); }
.btn-violet { background: var(--accent-alt); color: var(--accent-alt-fg); }
.btn-violet:hover:not(:disabled) { filter: brightness(0.9); }
.btn-theme {
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.btn-theme:hover { color: var(--text); background: var(--surface2); }

/* ── Toolbar ── */
#toolbar {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: var(--h-toolbar);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: nowrap;
  position: sticky;
  top: var(--h-header);
  z-index: 99;
}
#toolbar input[type="text"] {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 6px 12px;
  flex: 1;
  min-width: 0;
  outline: none;
}
#toolbar input[type="text"]::placeholder { color: var(--text-dim); }
#toolbar input[type="text"]:focus { border-color: var(--accent); }
#repo-filter, #status-filter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  padding: 6px 10px;
  outline: none;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
#repo-filter:focus, #status-filter:focus { border-color: var(--accent); }
#repo-filter option, #status-filter option { background: var(--bg-alt); }

.stat-action-btn {
  font-family: inherit;
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.stat-action-btn:hover { color: var(--text); background: var(--surface); }
.stat-action-btn.danger { color: var(--danger); border-color: var(--b-hi-bg); }
.stat-action-btn.danger:hover { background: var(--b-hi-bg); }

/* ── Stat bar ── */
#stat-bar {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: var(--h-statbar);
  display: flex;
  gap: 24px;
  align-items: center;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim);
  position: sticky;
  top: calc(var(--h-header) + var(--h-toolbar));
  z-index: 98;
}
.stat-val { color: var(--text-muted); font-weight: 500; }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }

thead th {
  background: var(--bg-alt);
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 0 14px;
  height: 36px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  user-select: none;
}
thead th.num { text-align: right; }
thead th.check-col { width: 40px; padding: 0 10px; }

tbody tr { height: 36px; }
tbody tr:nth-child(even) td { background: var(--bg-alt); }
tbody tr:hover td { background: var(--surface) !important; }
tbody td {
  padding: 0 14px;
  border-bottom: 1px solid var(--bg-alt);
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  font-size: 14px;
}
[data-theme="dark"] tbody td { border-bottom-color: #1e1e1e; }
tbody td.check-col { padding: 0 10px; }
tbody td.title-col { max-width: 320px; }
tbody td.num {
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
}
tbody tr:last-child td { border-bottom: none; }

input[type="checkbox"] {
  accent-color: var(--accent);
  width: 14px; height: 14px;
  cursor: pointer;
}

/* ── Ticket link ── */
.ticket-link { color: var(--text); text-decoration: none; font-weight: 500; font-size: 14px; }
.ticket-link:hover { color: var(--accent); }
.enriched-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--purple);
  margin-left: 6px; vertical-align: middle;
}

/* ── Badges ── */
.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-radius: 3px;
  padding: 2px 7px;
  white-space: nowrap;
  line-height: 1.5;
}
.s-open        { background: var(--b-open-bg); color: var(--b-open-fg); }
.s-in_progress { background: var(--b-prog-bg); color: var(--b-prog-fg); }
.s-done        { background: var(--b-done-bg); color: var(--b-done-fg); }
.s-draft       { background: #1a1a2e; color: var(--purple); }
.s-rejected    { background: var(--b-hi-bg); color: var(--text-dim); }
tr.is-draft td { opacity: 0.7; }
tr.is-rejected td { opacity: 0.5; text-decoration: line-through; }
.p-high        { background: var(--b-hi-bg);   color: var(--b-hi-fg); }
.p-medium      { background: var(--b-med-bg);  color: var(--b-med-fg); }
.p-low         { background: var(--b-lo-bg);   color: var(--b-lo-fg); }
.i-critical    { background: var(--b-crit-bg); color: var(--b-crit-fg); }
.i-high        { background: var(--b-hi-bg);   color: var(--b-hi-fg); }
.i-medium      { background: var(--b-med-bg);  color: var(--b-med-fg); }
.i-low         { background: var(--b-lo-bg);   color: var(--b-lo-fg); }
.label-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--b-chip-fg);
  background: var(--b-chip-bg);
  border-radius: 3px;
  padding: 1px 6px;
  margin-right: 3px;
}
.repo-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
  display: block;
  margin-top: 2px;
}
.val-pass { color: var(--success); font-family: 'JetBrains Mono', monospace; font-size: 14px; }
.val-fail { color: var(--danger);  font-family: 'JetBrains Mono', monospace; font-size: 14px; }
.val-none { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

/* ── Action buttons ── */
.action-btns { display: flex; gap: 5px; align-items: center; }
.btn-xs {
  font-family: inherit;
  font-size: 13px;
  border-radius: 3px;
  padding: 3px 9px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
}
.btn-xs:hover { background: var(--surface); color: var(--text); }
.btn-xs.enrich { color: var(--purple); border-color: var(--border); }
.btn-xs.enrich:hover { background: var(--surface); }
.btn-xs.del { color: var(--danger); }
.btn-xs.del:hover { background: var(--surface); }
.btn-xs:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Empty ── */
.empty { text-align: center; color: var(--text-dim); padding: 72px 0; font-size: 14px; }
.empty strong { display: block; font-size: 16px; color: var(--text-muted); margin-bottom: 8px; }

/* ── Spinner ── */
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid rgba(128,128,128,.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .5s linear infinite;
  margin-right: 6px; vertical-align: middle;
}
.spinner.dark { border-top-color: var(--purple); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 18px; border-radius: 4px;
  font-size: 14px; opacity: 0; transition: opacity .2s;
  pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; }
#toast.error { background: var(--b-hi-bg); border-color: var(--danger); color: var(--danger); }

/* ── Modals ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-alt); border: 1px solid var(--border);
  border-radius: 6px; padding: 24px;
  width: 520px; max-width: 95vw; max-height: 92vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}
.modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 18px; color: var(--text); }
.modal label {
  display: block; font-size: 14px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em;
  color: var(--text-dim); margin-top: 14px; margin-bottom: 5px;
}
.modal input[type="text"],
.modal textarea,
.modal select {
  width: 100%; font-family: inherit; font-size: 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); padding: 8px 12px; outline: none;
}
.modal input[type="text"]:focus,
.modal textarea:focus,
.modal select:focus { border-color: var(--accent); }
.modal input::placeholder, .modal textarea::placeholder { color: var(--text-dim); }
.modal textarea { resize: vertical; min-height: 72px; font-family: inherit; }
.modal select option { background: var(--bg-alt); }
.modal-hint { font-size: 14px; color: var(--text-dim); margin-top: 5px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
</style>
</head>
<body>

<header>
  <a href="/" style="text-decoration:none"><span class="logo">⬡ Tickets</span></a>
  <div class="header-sep"></div>
  <a href="/logs" class="nav-link">Logs</a>
  <a href="/review" class="nav-link" id="review-nav-link" style="display:none">
    Review <span id="header-draft-count" style="font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--b-draft-bg,#1a1a2e);color:var(--purple);border-radius:8px;padding:1px 7px;margin-left:2px;font-weight:600"></span>
  </a>
  <div class="spacer"></div>
  <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">☀ Bright</button>
  <div class="header-sep"></div>
  <button class="btn btn-ghost" onclick="openBatchCreate()">Batch Create</button>
  <button class="btn btn-primary" onclick="openCreate()">+ New Ticket</button>
</header>

<div id="toolbar">
  <input id="repo-input" type="text" placeholder="Repo path (../my-project) or GitHub URL" />
  <button class="btn btn-primary" id="generate-btn" onclick="generateTickets()">Generate from Repo</button>
  <div class="header-sep"></div>
  <button class="btn btn-violet" id="enrich-all-btn" onclick="enrichAll()">✦ Enrich Selected</button>
  <div class="header-sep"></div>
  <select id="status-filter" onchange="applyFilters()" title="Filter by status">
    <option value="">All statuses</option>
    <option value="open">Open</option>
    <option value="in_progress">In Progress</option>
    <option value="done">Done</option>
    <option value="draft">Draft</option>
    <option value="rejected">Rejected</option>
  </select>
  <select id="repo-filter" onchange="applyFilters()" title="Filter by repo">
    <option value="">All repos</option>
  </select>
  <button class="btn-theme" id="drafts-toggle" onclick="toggleDrafts()" title="Toggle draft/rejected tickets">Hide Drafts</button>
</div>

<div id="stat-bar">
  <span>Tickets: <span class="stat-val" id="stat-total">—</span></span>
  <span>Open: <span class="stat-val" id="stat-open">—</span></span>
  <span>Validated: <span class="stat-val" id="stat-validated">—</span></span>
  <span>Pass rate: <span class="stat-val" id="stat-passrate">—</span></span>
  <div style="flex:1"></div>
  <button class="stat-action-btn" onclick="selectAll()">Select All</button>
  <button class="stat-action-btn" onclick="deselectAll()">Deselect All</button>
  <span id="selection-info" style="display:none;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent)"></span>
  <button class="stat-action-btn danger" id="delete-selected-btn" onclick="deleteSelected()" style="display:none">Delete</button>
</div>

<main>
  <div class="table-wrap">
    <div id="ticket-container"></div>
  </div>
</main>

<!-- Create/Edit modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">New Ticket</h2>
    <input type="hidden" id="modal-id" />
    <label>Title *</label>
    <input id="f-title" type="text" placeholder="Short, actionable title" />
    <label>Business Requirement</label>
    <textarea id="f-business-req" style="min-height:60px" placeholder="The business need this ticket addresses"></textarea>
    <label>Stakeholder</label>
    <input id="f-stakeholder" type="text" placeholder="e.g. Product, Engineering, Customer" />
    <label>User Story</label>
    <textarea id="f-user-story" style="min-height:60px" placeholder="As a <role>, I want <goal> so that <benefit>"></textarea>
    <label>Description</label>
    <textarea id="f-desc" placeholder="What needs to be done? Leave blank — Enrich will fill it."></textarea>
    <p class="modal-hint">Leave blank and use ✦ Enrich to let AI fill this in.</p>
    <label>Status</label>
    <select id="f-status">
      <option value="open">Open</option>
      <option value="in_progress">In Progress</option>
      <option value="done">Done</option>
    </select>
    <label>Priority</label>
    <select id="f-priority">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <label>Importance</label>
    <select id="f-importance">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
    <label>Labels (comma-separated)</label>
    <input id="f-labels" type="text" placeholder="bug, feature, docs" />
    <label>Source Repo</label>
    <input id="f-repo" type="text" placeholder="../my-project or https://github.com/..." />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitTicket()">Save</button>
    </div>
  </div>
</div>

<!-- Batch Create modal -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal">
    <h2>Batch Create Tickets</h2>
    <label>Ticket titles — one per line</label>
    <textarea id="batch-titles" style="min-height:150px;font-family:'JetBrains Mono',monospace;font-size:14px" placeholder="Fix login bug&#10;Add dark mode&#10;Improve test coverage&#10;Update API docs"></textarea>
    <label>Source Repo (optional)</label>
    <input id="batch-repo" type="text" placeholder="../my-project or https://github.com/..." />
    <p class="modal-hint">Descriptions will be empty — run ✦ Enrich after to let AI fill them in.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeBatchModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitBatch()">Create All</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api';
let enrichingIds = new Set();
let currentTickets = [];
let showDrafts = true;

// ── Theme ─────────────────────────────────────────────────────────────────────

function initTheme() {
  const saved = localStorage.getItem('ats-theme') || 'dark';
  applyTheme(saved);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('ats-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀ Bright' : '◗ Dark';
}

// ── Data ─────────────────────────────────────────────────────────────────────

async function loadTickets() {
  const res = await fetch(`${API}/tickets`);
  currentTickets = await res.json();
  populateRepoFilter(currentTickets);
  updateDraftBadge(currentTickets);
  applyFilters();
  updateStats(currentTickets);
}

function updateDraftBadge(tickets) {
  const count = tickets.filter(t => t.status === 'draft').length;
  const link = document.getElementById('review-nav-link');
  const badge = document.getElementById('header-draft-count');
  if (count > 0) {
    badge.textContent = count;
    link.style.display = '';
  } else {
    link.style.display = 'none';
  }
}

function toggleDrafts() {
  showDrafts = !showDrafts;
  document.getElementById('drafts-toggle').textContent = showDrafts ? 'Hide Drafts' : 'Show Drafts';
  applyFilters();
}

function populateRepoFilter(tickets) {
  const sel = document.getElementById('repo-filter');
  const current = sel.value;
  const visibleTickets = showDrafts ? tickets : tickets.filter(t => t.status !== 'draft' && t.status !== 'rejected');
  const repos = [...new Set(visibleTickets.map(t => t.source_repo).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All repos</option>' +
    repos.map(r => `<option value="${esc(r)}" ${r === current ? 'selected' : ''}>${esc(repoShort(r))}</option>`).join('');
}

function applyFilters() {
  let filtered = currentTickets;
  const statusFilter = document.getElementById('status-filter').value;
  if (statusFilter) {
    filtered = filtered.filter(t => t.status === statusFilter);
  } else if (!showDrafts) {
    filtered = filtered.filter(t => t.status !== 'draft' && t.status !== 'rejected');
  }
  const repoFilter = document.getElementById('repo-filter').value;
  if (repoFilter) {
    filtered = filtered.filter(t => t.source_repo === repoFilter);
  }
  renderTable(filtered);
}

function updateStats(tickets) {
  document.getElementById('stat-total').textContent = tickets.length;
  document.getElementById('stat-open').textContent = tickets.filter(t => t.status === 'open').length;
  const validated = tickets.filter(t => t.validation_passed !== null && t.validation_passed !== undefined);
  const passed = tickets.filter(t => t.validation_passed === true);
  document.getElementById('stat-validated').textContent = validated.length;
  document.getElementById('stat-passrate').textContent = validated.length
    ? Math.round(passed.length / validated.length * 100) + '%' : '—';
}

async function generateTickets() {
  const source = document.getElementById('repo-input').value.trim();
  if (!source) { toast('Enter a repo path or GitHub URL', true); return; }
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  try {
    const body = source.startsWith('http') ? { repo_url: source } : { repo_path: source };
    const res = await fetch(`${API}/agents/create-from-repo`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const tickets = await res.json();
    toast(`Created ${tickets.length} ticket(s)`);
    loadTickets();
  } catch(e) { toast('Failed: ' + e.message, true); }
  finally { btn.disabled = false; btn.textContent = 'Generate from Repo'; }
}

async function enrichAll() {
  const globalSource = document.getElementById('repo-input').value.trim();
  const checked = [...document.querySelectorAll('.row-check:checked')].map(el => el.dataset.id);
  const btn = document.getElementById('enrich-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enriching…';
  try {
    const body = {};
    if (globalSource.startsWith('http')) body.repo_url = globalSource;
    else if (globalSource) body.repo_path = globalSource;
    if (checked.length) body.ticket_ids = checked;
    const res = await fetch(`${API}/agents/enrich-batch`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    const tickets = await res.json();
    toast(`Enriched ${tickets.length} ticket(s)`);
    loadTickets();
  } catch(e) { toast('Enrich failed: ' + e.message, true); }
  finally { btn.disabled = false; btn.innerHTML = '✦ Enrich Selected'; }
}

async function enrichTicket(id, fallbackSource) {
  const source = document.getElementById('repo-input').value.trim() || fallbackSource || '';
  enrichingIds.add(id);
  setEnrichLoading(id, true);
  try {
    const body = source.startsWith('http') ? { repo_url: source } : (source ? { repo_path: source } : {});
    const res = await fetch(`${API}/agents/enrich/${id}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    toast('Enriched');
    loadTickets();
  } catch(e) { toast('Enrich failed: ' + e.message, true); }
  finally { enrichingIds.delete(id); setEnrichLoading(id, false); }
}

async function deleteTicket(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  const res = await fetch(`${API}/tickets/${id}`, { method: 'DELETE' });
  if (res.ok) { toast('Deleted'); loadTickets(); }
  else toast('Delete failed', true);
}

// ── Modals ────────────────────────────────────────────────────────────────────

function openCreate() {
  document.getElementById('modal-title').textContent = 'New Ticket';
  document.getElementById('modal-id').value = '';
  ['f-title','f-business-req','f-stakeholder','f-user-story','f-desc','f-labels','f-repo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'open';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-importance').value = 'medium';
  document.getElementById('modal').classList.add('open');
}

function openEdit(t) {
  document.getElementById('modal-title').textContent = 'Edit Ticket';
  document.getElementById('modal-id').value = t.id;
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-business-req').value = t.business_req || '';
  document.getElementById('f-stakeholder').value = t.stakeholder || '';
  document.getElementById('f-user-story').value = t.user_story || '';
  document.getElementById('f-desc').value = t.description || '';
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-importance').value = t.importance || 'medium';
  document.getElementById('f-labels').value = (t.labels || []).join(', ');
  document.getElementById('f-repo').value = t.source_repo || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function submitTicket() {
  const id = document.getElementById('modal-id').value;
  const payload = {
    title: document.getElementById('f-title').value.trim(),
    business_req: document.getElementById('f-business-req').value.trim(),
    stakeholder: document.getElementById('f-stakeholder').value.trim(),
    user_story: document.getElementById('f-user-story').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    importance: document.getElementById('f-importance').value,
    labels: document.getElementById('f-labels').value.split(',').map(s=>s.trim()).filter(Boolean),
    source_repo: document.getElementById('f-repo').value.trim(),
  };
  if (!payload.title) { toast('Title is required', true); return; }
  const url = id ? `${API}/tickets/${id}` : `${API}/tickets`;
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if (res.ok) {
    const ticket = await res.json();
    closeModal();
    if (id) {
      toast('Updated');
      loadTickets();
    } else {
      const hasSource = !!payload.source_repo;
      toast(hasSource ? 'Created — enriching & validating…' : 'Created — validating…');
      loadTickets();
      try {
        await fetch(`${API}/agents/kickstart/${ticket.id}`, { method: 'POST' });
        toast('Ready ✓');
        loadTickets();
      } catch(e) { /* ignore pipeline errors */ }
    }
  } else toast('Save failed', true);
}

function openBatchCreate() {
  document.getElementById('batch-titles').value = '';
  document.getElementById('batch-repo').value = '';
  document.getElementById('batch-modal').classList.add('open');
}
function closeBatchModal() { document.getElementById('batch-modal').classList.remove('open'); }

async function submitBatch() {
  const raw = document.getElementById('batch-titles').value;
  const titles = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!titles.length) { toast('Enter at least one title', true); return; }
  const repo_path = document.getElementById('batch-repo').value.trim() || undefined;
  const body = { titles };
  if (repo_path) body.repo_path = repo_path;
  const res = await fetch(`${API}/agents/create-batch`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (res.ok) {
    const created = await res.json();
    closeBatchModal();
    const hasSource = !!repo_path;
    toast(`Created ${created.length} ticket(s) — ${hasSource ? 'enriching & ' : ''}validating…`);
    loadTickets();
    for (const t of created) {
      try { await fetch(`${API}/agents/kickstart/${t.id}`, { method: 'POST' }); } catch(e) { /* ignore */ }
    }
    toast(`${created.length} ticket(s) ready ✓`);
    loadTickets();
  } else toast('Batch create failed', true);
}

// ── Table rendering ───────────────────────────────────────────────────────────

function renderTable(tickets) {
  const el = document.getElementById('ticket-container');
  if (!tickets.length) {
    el.innerHTML = '<div class="empty"><strong>No tickets yet</strong>Generate from a repo, batch create, or add one manually.</div>';
    return;
  }

  const rows = tickets.map(t => {
    const dot = (t.acceptance_criteria && t.acceptance_criteria.length)
      ? '<span class="enriched-dot" title="Enriched"></span>' : '';
    const valCell = t.validation_passed === true
      ? `<span class="val-pass">✓ ${pct(t.validation_score)}</span>`
      : t.validation_passed === false
        ? `<span class="val-fail">✗ ${pct(t.validation_score)}</span>`
        : '<span class="val-none">—</span>';
    const labels = (t.labels||[]).map(l=>`<span class="label-chip">${esc(l)}</span>`).join('');
    const repo = t.source_repo
      ? `<span class="repo-chip">${repoShort(t.source_repo)}</span>` : '';
    const safeSource = esc(t.source_repo || '').replace(/'/g, "\\'");
    const imp = t.importance || 'medium';
    return `<tr>
      <td class="check-col"><input type="checkbox" class="row-check" data-id="${t.id}"></td>
      <td class="title-col">
        <a href="/tickets/${t.id}" class="ticket-link">${esc(t.title)}${dot}</a>
        ${repo}
      </td>
      <td><span class="badge s-${t.status}">${t.status.replace('_',' ')}</span></td>
      <td><span class="badge p-${t.priority}">${t.priority}</span></td>
      <td><span class="badge i-${imp}">${imp}</span></td>
      <td class="num">${valCell}</td>
      <td>${labels}</td>
      <td class="num" style="color:var(--text-dim);font-family:'JetBrains Mono',monospace">${fmtDate(t.created_at)}</td>
      <td>
        <div class="action-btns">
          <button class="btn-xs" onclick='openEdit(${JSON.stringify(t)})'>Edit</button>
          <button class="btn-xs enrich" id="enrich-btn-${t.id}" onclick="enrichTicket('${t.id}','${safeSource}')" ${enrichingIds.has(t.id)?'disabled':''}>
            ${enrichingIds.has(t.id)?'<span class="spinner dark"></span>…':'✦ Enrich'}
          </button>
          <button class="btn-xs del" onclick="deleteTicket('${t.id}','${esc(t.title).replace(/'/g,"\\'")}')">Del</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table>
    <thead><tr>
      <th class="check-col"><input type="checkbox" id="select-all" onchange="toggleAll(this)" title="Select all"></th>
      <th>Title</th><th>Status</th><th>Priority</th><th>Importance</th>
      <th class="num">Validation</th><th>Labels</th><th class="num">Created</th><th>Actions</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  updateSelectionUI();
}

function toggleAll(master) {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = master.checked; });
  updateSelectionUI();
}

function selectAll() {
  const master = document.getElementById('select-all');
  if (master) master.checked = true;
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = true; });
  updateSelectionUI();
}

function deselectAll() {
  const master = document.getElementById('select-all');
  if (master) master.checked = false;
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = false; });
  updateSelectionUI();
}

function updateSelectionUI() {
  const checked = document.querySelectorAll('.row-check:checked');
  const n = checked.length;
  const info = document.getElementById('selection-info');
  const btn = document.getElementById('delete-selected-btn');
  if (n > 0) {
    info.textContent = `${n} selected`;
    info.style.display = '';
    btn.textContent = `Delete ${n}`;
    btn.style.display = '';
  } else {
    info.style.display = 'none';
    btn.style.display = 'none';
  }
}

async function deleteSelected() {
  const ids = [...document.querySelectorAll('.row-check:checked')].map(el => el.dataset.id);
  if (!ids.length) return;
  if (!confirm(`Delete ${ids.length} ticket(s)?`)) return;
  const btn = document.getElementById('delete-selected-btn');
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  let deleted = 0;
  for (const id of ids) {
    const res = await fetch(`${API}/tickets/${id}`, { method: 'DELETE' });
    if (res.ok) deleted++;
  }
  toast(`Deleted ${deleted} ticket(s)`);
  loadTickets();
}
function setEnrichLoading(id, loading) {
  const btn = document.getElementById(`enrich-btn-${id}`);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner dark"></span>…' : '✦ Enrich';
}
function pct(score) {
  return (score !== null && score !== undefined) ? Math.round(score * 100) + '%' : '—';
}
function repoShort(s) {
  if (!s) return '';
  if (s.startsWith('http')) {
    try {
      const parts = new URL(s).pathname.split('/').filter(Boolean);
      return '⎇ ' + (parts.length >= 2 ? parts.slice(-2).join('/') : s);
    } catch { return s; }
  }
  return '📁 ' + (s.split('/').pop() || s);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  return s ? new Date(s).toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}) : '—';
}
function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
document.getElementById('batch-modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeBatchModal(); });
document.getElementById('ticket-container').addEventListener('change', e => {
  if (e.target.classList.contains('row-check')) updateSelectionUI();
});

initTheme();
loadTickets();
</script>
</body>
</html>
