<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Logs — Agent Ticket System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #181818;
  --bg-alt:      #202020;
  --surface:     #2a2a2a;
  --surface2:    #333333;
  --text:        #f5f5f5;
  --text-muted:  #a0a0a0;
  --text-dim:    #6a6a6a;
  --border:      #333333;
  --accent:      #faff69;
  --accent-alt:  #ff6ec7;
  --success:     #b5e48c;
  --warning:     #ffa07a;
  --danger:      #ff6b6b;
  --blue:        #7bdff2;
  --purple:      #c7a9ff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-variant-numeric: tabular-nums; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.4;
}

header {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: .04em; text-transform: uppercase; }
.header-sep { width: 1px; height: 20px; background: var(--border); }
.nav-back { font-size: 12px; color: var(--text-muted); text-decoration: none; padding: 4px 8px; border-radius: 4px; }
.nav-back:hover { color: var(--text); background: var(--surface); }
.page-title { font-size: 13px; font-weight: 600; color: var(--text); }
.spacer { flex: 1; }

.toolbar {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .04em;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 3px 10px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
}
.filter-btn:hover { background: var(--surface); color: var(--text-muted); }
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.filter-btn.err { color: var(--danger); border-color: #3a1515; }
.filter-btn.err.active { background: var(--danger); color: #fff; border-color: var(--danger); }
.toolbar-meta { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 5px; }
.live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }
.btn-sm {
  font-family: inherit; font-size: 11px; border-radius: 3px;
  padding: 4px 10px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); cursor: pointer;
}
.btn-sm:hover { background: var(--surface); color: var(--text); }
.btn-sm.del { color: var(--danger); border-color: #3a1515; }
.btn-sm.del:hover { background: #1e0f0f; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
thead th {
  background: var(--bg-alt);
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 0 12px;
  height: 32px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 44px;
  white-space: nowrap;
}
thead th.num { text-align: right; }
tbody tr:nth-child(even) td { background: var(--bg-alt); }
tbody tr:hover td { background: var(--surface) !important; }
tbody td {
  padding: 0 12px;
  height: 30px;
  border-bottom: 1px solid #1e1e1e;
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
tbody tr:last-child td { border-bottom: none; }
tbody td.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
tbody td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
tbody td.details { max-width: 280px; white-space: normal; word-break: break-word; color: var(--text-muted); font-size: 11px; }

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-radius: 3px;
  padding: 1px 5px;
}
.ev-create      { background: #0d2a3a; color: var(--blue); }
.ev-enrich      { background: #1e0d2a; color: var(--purple); }
.ev-validate    { background: #2a2500; color: var(--accent); }
.ev-create_batch{ background: #0d2a14; color: var(--success); }
.ev-other       { background: var(--surface2); color: var(--text-dim); }
.st-success     { color: var(--success); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.st-error       { color: var(--danger); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.ticket-link    { color: var(--purple); text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.ticket-link:hover { color: var(--accent-alt); }

.empty { text-align: center; color: var(--text-dim); padding: 64px 0; font-size: 13px; }
.empty strong { display: block; font-size: 15px; color: var(--text-muted); margin-bottom: 6px; }

#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 16px; border-radius: 4px;
  font-size: 12px; opacity: 0; transition: opacity .2s;
  pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; }
#toast.error { background: #2a1212; border-color: var(--danger); color: var(--danger); }

#stat-bar {
  padding: 6px 20px;
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  gap: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.stat-val { color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <span class="logo">⬡ Ticket System</span>
  <div class="header-sep"></div>
  <a href="/" class="nav-back">← Tickets</a>
  <span class="page-title">Agent Logs</span>
  <div class="spacer"></div>
</header>

<div class="toolbar">
  <button id="filter-all" class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('create',this)">Create</button>
  <button class="filter-btn" onclick="setFilter('enrich',this)">Enrich</button>
  <button class="filter-btn" onclick="setFilter('validate',this)">Validate</button>
  <button class="filter-btn err" onclick="setFilter('error',this)">Errors</button>
  <div class="spacer"></div>
  <span class="toolbar-meta"><span class="live-dot"></span>Live · <span id="last-updated">—</span></span>
  <button class="btn-sm" onclick="loadLogs()">↻ Refresh</button>
  <button class="btn-sm del" onclick="clearLogs()">Clear</button>
</div>

<div id="stat-bar">
  <span>Total: <span class="stat-val" id="stat-total">—</span></span>
  <span>Errors: <span class="stat-val" id="stat-errors" style="color:var(--danger)">—</span></span>
  <span>Avg duration: <span class="stat-val" id="stat-avg">—</span></span>
</div>

<div id="log-container"></div>

<div id="toast"></div>

<script>
const API = '/api';
let allLogs = [];
let currentFilter = 'all';
let refreshTimer;

async function loadLogs() {
  const res = await fetch(`${API}/logs`);
  allLogs = await res.json();
  allLogs.reverse();
  renderLogs();
  updateStats();
  document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
}

function updateStats() {
  document.getElementById('stat-total').textContent = allLogs.length;
  document.getElementById('stat-errors').textContent = allLogs.filter(e => e.status === 'error').length;
  const withDur = allLogs.filter(e => e.duration_ms != null);
  const avg = withDur.length ? Math.round(withDur.reduce((s,e) => s + e.duration_ms, 0) / withDur.length) : null;
  document.getElementById('stat-avg').textContent = avg != null ? avg.toLocaleString() + ' ms' : '—';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLogs();
}

function renderLogs() {
  const filtered = allLogs.filter(e => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'error') return e.status === 'error';
    return e.event === currentFilter;
  });

  const el = document.getElementById('log-container');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><strong>No entries</strong>${currentFilter !== 'all' ? 'No entries for this filter.' : 'Logs will appear here as agents run.'}</div>`;
    return;
  }

  const rows = filtered.map(e => {
    const evClass = ['create','enrich','validate','create_batch'].includes(e.event)
      ? `ev-${e.event}` : 'ev-other';
    const ticketCell = e.ticket_id
      ? `<a href="/tickets/${esc(e.ticket_id)}" class="ticket-link">${esc(e.ticket_id.slice(0,8))}…</a>`
      : '<span style="color:var(--text-dim)">—</span>';
    const dur = e.duration_ms != null ? Math.round(e.duration_ms).toLocaleString() + ' ms' : '—';
    const stClass = e.status === 'success' ? 'st-success' : 'st-error';
    const stIcon = e.status === 'success' ? '✓' : '✗';
    return `<tr>
      <td class="mono" style="color:var(--text-dim)">${fmtTs(e.timestamp)}</td>
      <td><span class="badge ${evClass}">${esc(e.event)}</span></td>
      <td>${ticketCell}</td>
      <td class="mono" style="color:var(--text-muted)">${esc(e.agent)}</td>
      <td class="num">${dur}</td>
      <td><span class="${stClass}">${stIcon} ${e.status}</span></td>
      <td class="details">${esc(e.details || '')}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table>
    <thead><tr>
      <th>Timestamp</th><th>Event</th><th>Ticket</th><th>Agent</th><th class="num">Duration</th><th>Status</th><th>Details</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function clearLogs() {
  if (!confirm('Clear all logs?')) return;
  const res = await fetch(`${API}/logs`, { method: 'DELETE' });
  if (res.ok) { allLogs = []; renderLogs(); updateStats(); toast('Logs cleared'); }
  else toast('Clear failed', true);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTs(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

loadLogs();
refreshTimer = setInterval(loadLogs, 15000);
</script>
</body>
</html>
