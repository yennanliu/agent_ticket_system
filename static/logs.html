<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Logs — Agent Ticket System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #181818;
  --bg-alt:      #202020;
  --surface:     #2a2a2a;
  --surface2:    #333333;
  --text:        #f5f5f5;
  --text-muted:  #b0b0b0;
  --text-dim:    #6a6a6a;
  --border:      #333333;
  --accent:      #faff69;
  --accent-fg:   #000;
  --success:     #b5e48c;
  --warning:     #ffa07a;
  --danger:      #ff6b6b;
  --blue:        #7bdff2;
  --purple:      #c7a9ff;
  --b-hi-bg:     #2a1212; --b-hi-fg: #ff6b6b;
  --b-done-bg:   #0d2a14; --b-done-fg: #b5e48c;
  --h-header:    48px;
  --h-toolbar:   48px;
  --h-statbar:   34px;
}
[data-theme="light"] {
  --bg:          #ffffff;
  --bg-alt:      #f8f9fa;
  --surface:     #f1f5f9;
  --surface2:    #e2e8f0;
  --text:        #1a1a2e;
  --text-muted:  #334155;
  --text-dim:    #94a3b8;
  --border:      #e2e8f0;
  --accent:      #4f46e5;
  --accent-fg:   #fff;
  --success:     #16a34a;
  --warning:     #d97706;
  --danger:      #dc2626;
  --blue:        #1d4ed8;
  --purple:      #6d28d9;
  --b-hi-bg:     #fee2e2; --b-hi-fg: #991b1b;
  --b-done-bg:   #dcfce7; --b-done-fg: #15803d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-variant-numeric: tabular-nums; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.4;
  transition: background .2s, color .2s;
}

header {
  background: var(--bg-alt); border-bottom: 1px solid var(--border);
  padding: 0 20px; height: var(--h-header);
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: .04em; text-transform: uppercase; }
.header-sep { width: 1px; height: 22px; background: var(--border); }
.nav-back { font-size: 14px; color: var(--text-muted); text-decoration: none; padding: 4px 10px; border-radius: 4px; }
.nav-back:hover { color: var(--text); background: var(--surface); }
.page-title { font-size: 14px; font-weight: 600; color: var(--text); }
.spacer { flex: 1; }
.btn-theme {
  font-size: 13px; padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-muted); cursor: pointer; font-family: inherit;
}
.btn-theme:hover { color: var(--text); background: var(--surface2); }

.toolbar {
  background: var(--bg-alt); border-bottom: 1px solid var(--border);
  padding: 0 20px; height: var(--h-toolbar);
  display: flex; gap: 6px; align-items: center; flex-wrap: nowrap;
  position: sticky; top: var(--h-header); z-index: 99;
  overflow-x: auto;
}
.filter-btn {
  font-family: inherit; font-size: 14px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .04em;
  border: 1px solid var(--border); border-radius: 3px;
  padding: 4px 12px; background: transparent; color: var(--text-dim); cursor: pointer;
  white-space: nowrap;
}
.filter-btn:hover { background: var(--surface); color: var(--text-muted); }
.filter-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.filter-btn.err { color: var(--danger); }
.filter-btn.err.active { background: var(--danger); color: #fff; border-color: var(--danger); }
.toolbar-meta { font-size: 14px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.live-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.btn-sm {
  font-family: inherit; font-size: 14px; border-radius: 3px;
  padding: 4px 12px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); cursor: pointer; white-space: nowrap;
}
.btn-sm:hover { background: var(--surface); color: var(--text); }
.btn-sm.del { color: var(--danger); }
.btn-sm.del:hover { background: var(--b-hi-bg); }

#stat-bar {
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 0 20px; height: var(--h-statbar);
  display: flex; gap: 24px; align-items: center;
  font-size: 14px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim);
  position: sticky; top: calc(var(--h-header) + var(--h-toolbar)); z-index: 98;
}
.stat-val { color: var(--text-muted); font-weight: 500; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  background: var(--bg-alt); color: var(--text-dim);
  font-size: 14px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em;
  padding: 0 14px; height: 36px; text-align: left;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: calc(var(--h-header) + var(--h-toolbar) + var(--h-statbar));
  z-index: 97; white-space: nowrap;
}
thead th.num { text-align: right; }
tbody tr:nth-child(even) td { background: var(--bg-alt); }
tbody tr:hover td { background: var(--surface) !important; }
tbody td {
  padding: 0 14px; height: 34px;
  border-bottom: 1px solid var(--bg-alt);
  vertical-align: middle; font-size: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
[data-theme="dark"] tbody td { border-bottom-color: #1e1e1e; }
tbody tr:last-child td { border-bottom: none; }
tbody td.mono { font-family: 'JetBrains Mono', monospace; }
tbody td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
tbody td.details { max-width: 260px; white-space: normal; color: var(--text-muted); }

.badge {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .04em;
  border-radius: 3px; padding: 2px 6px;
}
.ev-create       { background: #0d2a3a; color: #7bdff2; }
.ev-enrich       { background: #1e0d2a; color: var(--purple); }
.ev-validate     { background: #2a2500; color: #faff69; }
.ev-create_batch { background: #0d2a14; color: #b5e48c; }
.ev-other        { background: var(--surface2); color: var(--text-dim); }
[data-theme="light"] .ev-create       { background: #dbeafe; color: #1d4ed8; }
[data-theme="light"] .ev-enrich       { background: #ede9fe; color: #6d28d9; }
[data-theme="light"] .ev-validate     { background: #fef3c7; color: #92400e; }
[data-theme="light"] .ev-create_batch { background: #dcfce7; color: #15803d; }
[data-theme="light"] .ev-other        { background: #f1f5f9; color: #64748b; }

.st-success { color: var(--success); font-family: 'JetBrains Mono', monospace; }
.st-error   { color: var(--danger);  font-family: 'JetBrains Mono', monospace; }
.ticket-link { color: var(--purple); text-decoration: none; font-family: 'JetBrains Mono', monospace; }
.ticket-link:hover { color: var(--accent); }

.empty { text-align: center; color: var(--text-dim); padding: 64px 0; font-size: 14px; }
.empty strong { display: block; font-size: 16px; color: var(--text-muted); margin-bottom: 8px; }

#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 18px; border-radius: 4px;
  font-size: 14px; opacity: 0; transition: opacity .2s;
  pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; }
#toast.error { background: var(--b-hi-bg); border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<header>
  <span class="logo">⬡ Tickets</span>
  <div class="header-sep"></div>
  <a href="/" class="nav-back">← Tickets</a>
  <span class="page-title">Agent Logs</span>
  <div class="spacer"></div>
  <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">☀ Bright</button>
</header>

<div class="toolbar">
  <button id="filter-all" class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('create',this)">Create</button>
  <button class="filter-btn" onclick="setFilter('enrich',this)">Enrich</button>
  <button class="filter-btn" onclick="setFilter('validate',this)">Validate</button>
  <button class="filter-btn err" onclick="setFilter('error',this)">Errors</button>
  <div class="spacer"></div>
  <span class="toolbar-meta"><span class="live-dot"></span>Live · <span id="last-updated">—</span></span>
  <button class="btn-sm" onclick="loadLogs()">↻ Refresh</button>
  <button class="btn-sm del" onclick="clearLogs()">Clear</button>
</div>

<div id="stat-bar">
  <span>Total: <span class="stat-val" id="stat-total">—</span></span>
  <span>Errors: <span class="stat-val" id="stat-errors" style="color:var(--danger)">—</span></span>
  <span>Avg duration: <span class="stat-val" id="stat-avg">—</span></span>
</div>

<div id="log-container"></div>
<div id="toast"></div>

<script>
const API = '/api';
let allLogs = [];
let currentFilter = 'all';

function initTheme() {
  const saved = localStorage.getItem('ats-theme') || 'dark';
  applyTheme(saved);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('ats-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀ Bright' : '◗ Dark';
}

async function loadLogs() {
  const res = await fetch(`${API}/logs`);
  allLogs = await res.json();
  allLogs.reverse();
  renderLogs();
  updateStats();
  document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
}

function updateStats() {
  document.getElementById('stat-total').textContent = allLogs.length;
  document.getElementById('stat-errors').textContent = allLogs.filter(e => e.status === 'error').length;
  const withDur = allLogs.filter(e => e.duration_ms != null);
  const avg = withDur.length ? Math.round(withDur.reduce((s,e) => s + e.duration_ms, 0) / withDur.length) : null;
  document.getElementById('stat-avg').textContent = avg != null ? avg.toLocaleString() + ' ms' : '—';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLogs();
}

function renderLogs() {
  const filtered = allLogs.filter(e => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'error') return e.status === 'error';
    return e.event === currentFilter;
  });
  const el = document.getElementById('log-container');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><strong>No entries</strong>${currentFilter !== 'all' ? 'No entries for this filter.' : 'Logs appear here as agents run.'}</div>`;
    return;
  }
  const rows = filtered.map(e => {
    const evClass = ['create','enrich','validate','create_batch'].includes(e.event) ? `ev-${e.event}` : 'ev-other';
    const ticketCell = e.ticket_id
      ? `<a href="/tickets/${esc(e.ticket_id)}" class="ticket-link">${esc(e.ticket_id.slice(0,8))}…</a>`
      : '<span style="color:var(--text-dim)">—</span>';
    const dur = e.duration_ms != null ? Math.round(e.duration_ms).toLocaleString() + ' ms' : '—';
    const stClass = e.status === 'success' ? 'st-success' : 'st-error';
    return `<tr>
      <td class="mono" style="color:var(--text-dim)">${fmtTs(e.timestamp)}</td>
      <td><span class="badge ${evClass}">${esc(e.event)}</span></td>
      <td>${ticketCell}</td>
      <td class="mono" style="color:var(--text-muted)">${esc(e.agent)}</td>
      <td class="num">${dur}</td>
      <td><span class="${stClass}">${e.status === 'success' ? '✓' : '✗'} ${e.status}</span></td>
      <td class="details">${esc(e.details || '')}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table>
    <thead><tr>
      <th>Timestamp</th><th>Event</th><th>Ticket</th><th>Agent</th><th class="num">Duration</th><th>Status</th><th>Details</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function clearLogs() {
  if (!confirm('Clear all logs?')) return;
  const res = await fetch(`${API}/logs`, { method: 'DELETE' });
  if (res.ok) { allLogs = []; renderLogs(); updateStats(); toast('Logs cleared'); }
  else toast('Clear failed', true);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTs(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

initTheme();
loadLogs();
setInterval(loadLogs, 15000);
</script>
</body>
</html>
