<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Queue — Agent Ticket System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #181818;
  --bg-alt:      #202020;
  --surface:     #2a2a2a;
  --surface2:    #333333;
  --text:        #f5f5f5;
  --text-muted:  #b0b0b0;
  --text-dim:    #6a6a6a;
  --border:      #333333;
  --accent:      #faff69;
  --accent-fg:   #000;
  --accent-alt:  #ff6ec7;
  --accent-alt-fg: #000;
  --success:     #b5e48c;
  --warning:     #ffa07a;
  --danger:      #ff6b6b;
  --blue:        #7bdff2;
  --purple:      #c7a9ff;
  --b-open-bg:   #0d2a3a; --b-open-fg:   #7bdff2;
  --b-prog-bg:   #2a2500; --b-prog-fg:   #faff69;
  --b-done-bg:   #0d2a14; --b-done-fg:   #b5e48c;
  --b-draft-bg:  #1a1a2e; --b-draft-fg:  #c7a9ff;
  --b-hi-bg:     #2a1212; --b-hi-fg:     #ff6b6b;
  --b-med-bg:    #2a1c0a; --b-med-fg:    #ffa07a;
  --b-lo-bg:     #0d2a14; --b-lo-fg:     #b5e48c;
  --b-crit-bg:   #2a0f2a; --b-crit-fg:   #ff6ec7;
  --b-chip-bg:   #333333; --b-chip-fg:   #b0b0b0;
  --h-header:    48px;
  --h-toolbar:   48px;
}
[data-theme="light"] {
  --bg:          #ffffff;
  --bg-alt:      #f8f9fa;
  --surface:     #f1f5f9;
  --surface2:    #e2e8f0;
  --text:        #1a1a2e;
  --text-muted:  #334155;
  --text-dim:    #94a3b8;
  --border:      #e2e8f0;
  --accent:      #4f46e5;
  --accent-fg:   #fff;
  --accent-alt:  #9333ea;
  --accent-alt-fg: #fff;
  --success:     #16a34a;
  --warning:     #d97706;
  --danger:      #dc2626;
  --blue:        #1d4ed8;
  --purple:      #6d28d9;
  --b-open-bg:   #dbeafe; --b-open-fg:   #1d4ed8;
  --b-prog-bg:   #fef3c7; --b-prog-fg:   #92400e;
  --b-done-bg:   #dcfce7; --b-done-fg:   #15803d;
  --b-draft-bg:  #ede9fe; --b-draft-fg:  #6d28d9;
  --b-hi-bg:     #fee2e2; --b-hi-fg:     #991b1b;
  --b-med-bg:    #ffedd5; --b-med-fg:    #9a3412;
  --b-lo-bg:     #f0fdf4; --b-lo-fg:     #166534;
  --b-crit-bg:   #fce7f3; --b-crit-fg:   #9d174d;
  --b-chip-bg:   #e2e8f0; --b-chip-fg:   #475569;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.4;
  transition: background .2s, color .2s;
}

/* ── Header ── */
header {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: var(--h-header);
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: .04em; text-transform: uppercase; text-decoration: none; }
.header-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.nav-link { font-size: 14px; color: var(--text-muted); text-decoration: none; padding: 4px 10px; border-radius: 4px; }
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--text); background: var(--surface); }
.spacer { flex: 1; }
.btn-theme {
  font-size: 13px; padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-muted); cursor: pointer; font-family: inherit;
}
.btn-theme:hover { color: var(--text); background: var(--surface2); }
.btn {
  font-family: inherit; font-size: 13px; font-weight: 500;
  border: none; border-radius: 4px; padding: 5px 12px;
  cursor: pointer; white-space: nowrap; line-height: 1.3;
  transition: filter .15s, background .15s;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-approve { background: var(--b-done-bg); color: var(--b-done-fg); border: 1px solid rgba(181,228,140,0.2); }
.btn-approve:hover:not(:disabled) { filter: brightness(1.15); }
.btn-reject  { background: var(--b-hi-bg);   color: var(--b-hi-fg);   border: 1px solid rgba(255,107,107,0.2); }
.btn-reject:hover:not(:disabled)  { filter: brightness(1.15); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surface); }
.btn-primary { background: var(--accent); color: var(--accent-fg); }
.btn-primary:hover:not(:disabled) { filter: brightness(0.9); }

/* ── Toolbar ── */
#toolbar {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: var(--h-toolbar);
  display: flex;
  gap: 10px;
  align-items: center;
  position: sticky;
  top: var(--h-header);
  z-index: 99;
}
.toolbar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.count-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--b-draft-bg);
  color: var(--b-draft-fg);
  border-radius: 10px;
  padding: 2px 8px;
  font-weight: 600;
}

/* ── Main ── */
main { padding: 24px 20px 60px; max-width: 1200px; margin: 0 auto; }

/* ── Cards grid ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}

.draft-card {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
  display: flex;
  flex-direction: column;
}
.draft-card:hover {
  border-color: var(--surface2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

.card-top {
  padding: 16px 18px 12px;
  flex: 1;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 10px;
}
.card-title a {
  color: inherit;
  text-decoration: none;
}
.card-title a:hover { color: var(--accent); }

.card-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  align-items: center;
}
.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-radius: 3px;
  padding: 2px 6px;
  white-space: nowrap;
}
.b-draft    { background: var(--b-draft-bg); color: var(--b-draft-fg); }
.p-high     { background: var(--b-hi-bg);    color: var(--b-hi-fg); }
.p-medium   { background: var(--b-med-bg);   color: var(--b-med-fg); }
.p-low      { background: var(--b-lo-bg);    color: var(--b-lo-fg); }
.i-critical { background: var(--b-crit-bg);  color: var(--b-crit-fg); }
.i-high     { background: var(--b-hi-bg);    color: var(--b-hi-fg); }
.i-medium   { background: var(--b-med-bg);   color: var(--b-med-fg); }
.i-low      { background: var(--b-lo-bg);    color: var(--b-lo-fg); }

.card-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 10px;
}
.card-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.val-score-pass { color: var(--success); }
.val-score-fail { color: var(--danger); }
.val-score-none { color: var(--text-dim); }

.card-actions {
  border-top: 1px solid var(--border);
  padding: 10px 18px;
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--surface);
}
.card-actions .btn-view {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-dim);
  text-decoration: none;
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  transition: color .15s, background .15s;
}
.card-actions .btn-view:hover { color: var(--text); background: var(--surface2); }

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 80px 0;
  color: var(--text-dim);
}
.empty strong {
  display: block;
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.empty p { margin-bottom: 20px; }

/* ── Spinner ── */
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid rgba(128,128,128,.2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .5s linear infinite;
  margin-right: 5px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 18px; border-radius: 4px;
  font-size: 14px; opacity: 0; transition: opacity .2s;
  pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; }
#toast.error { background: var(--b-hi-bg); border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">⬡ Tickets</a>
  <div class="header-sep"></div>
  <a href="/tickets" class="nav-link">All Tickets</a>
  <a href="/review" class="nav-link active">Review Queue</a>
  <a href="/logs" class="nav-link">Logs</a>
  <div class="spacer"></div>
  <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">☀ Bright</button>
</header>

<div id="toolbar">
  <div class="toolbar-title">
    Draft Review Queue
    <span class="count-badge" id="draft-count">0</span>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-approve" id="approve-all-btn" onclick="approveAll()" style="display:none">Approve All</button>
  <button class="btn btn-reject"  id="reject-all-btn"  onclick="rejectAll()"  style="display:none">Reject All</button>
</div>

<main>
  <div id="cards-container"></div>
</main>

<div id="toast"></div>

<script>
const API = '/api';
let drafts = [];

function initTheme() {
  const saved = localStorage.getItem('ats-theme') || 'dark';
  applyTheme(saved);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('ats-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀ Bright' : '◗ Dark';
}

async function loadDrafts() {
  const res = await fetch(`${API}/tickets`);
  const all = await res.json();
  drafts = all.filter(t => t.status === 'draft');
  renderCards(drafts);
}

function renderCards(tickets) {
  const el = document.getElementById('cards-container');
  const count = tickets.length;
  document.getElementById('draft-count').textContent = count;
  document.getElementById('approve-all-btn').style.display = count ? '' : 'none';
  document.getElementById('reject-all-btn').style.display  = count ? '' : 'none';

  if (!count) {
    el.innerHTML = `<div class="empty">
      <strong>No drafts pending review</strong>
      <p>AI-generated tickets will appear here for approval before entering the active backlog.</p>
      <a href="/tickets" class="btn btn-ghost" style="display:inline-block;font-family:inherit;font-size:14px;padding:7px 18px;border-radius:4px;text-decoration:none">← Back to Tickets</a>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="cards-grid">${tickets.map(renderCard).join('')}</div>`;
}

function renderCard(t) {
  const imp = t.importance || 'medium';
  const valHtml = t.validation_passed === true
    ? `<span class="val-score-pass">✓ ${pct(t.validation_score)}</span>`
    : t.validation_passed === false
      ? `<span class="val-score-fail">✗ ${pct(t.validation_score)}</span>`
      : `<span class="val-score-none">not validated</span>`;
  const repoHtml = t.source_repo
    ? `<span title="${esc(t.source_repo)}">${esc(repoShort(t.source_repo))}</span>` : '';
  const desc = t.description || t.business_req || '';

  return `<div class="draft-card" id="card-${t.id}">
    <div class="card-top">
      <div class="card-title">
        <a href="/tickets/${t.id}">${esc(t.title)}</a>
      </div>
      <div class="card-badges">
        <span class="badge b-draft">Draft</span>
        <span class="badge p-${t.priority}">${t.priority}</span>
        <span class="badge i-${imp}">${imp}</span>
      </div>
      ${desc ? `<div class="card-desc">${esc(desc)}</div>` : ''}
      <div class="card-meta">
        <span>val: ${valHtml}</span>
        ${repoHtml ? `<span>${repoHtml}</span>` : ''}
        <span>${fmtDate(t.created_at)}</span>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn btn-approve" onclick="approveTicket('${t.id}')">✓ Approve</button>
      <button class="btn btn-reject"  onclick="rejectTicket('${t.id}')">✗ Reject</button>
      <a href="/tickets/${t.id}" class="btn-view">View →</a>
    </div>
  </div>`;
}

async function approveTicket(id) {
  const card = document.getElementById(`card-${id}`);
  card.style.opacity = '0.5';
  const res = await fetch(`${API}/tickets/${id}/approve`, { method: 'POST' });
  if (res.ok) {
    card.remove();
    drafts = drafts.filter(t => t.id !== id);
    renderCards(drafts);
    toast('Approved — ticket is now open');
  } else {
    card.style.opacity = '';
    toast('Approve failed', true);
  }
}

async function rejectTicket(id) {
  const card = document.getElementById(`card-${id}`);
  card.style.opacity = '0.5';
  const res = await fetch(`${API}/tickets/${id}/reject`, { method: 'POST' });
  if (res.ok) {
    card.remove();
    drafts = drafts.filter(t => t.id !== id);
    renderCards(drafts);
    toast('Rejected');
  } else {
    card.style.opacity = '';
    toast('Reject failed', true);
  }
}

async function approveAll() {
  const btn = document.getElementById('approve-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Approving…';
  let count = 0;
  for (const t of [...drafts]) {
    const res = await fetch(`${API}/tickets/${t.id}/approve`, { method: 'POST' });
    if (res.ok) count++;
  }
  toast(`Approved ${count} ticket(s)`);
  loadDrafts();
  btn.disabled = false;
  btn.textContent = 'Approve All';
}

async function rejectAll() {
  if (!confirm(`Reject all ${drafts.length} draft tickets?`)) return;
  const btn = document.getElementById('reject-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Rejecting…';
  let count = 0;
  for (const t of [...drafts]) {
    const res = await fetch(`${API}/tickets/${t.id}/reject`, { method: 'POST' });
    if (res.ok) count++;
  }
  toast(`Rejected ${count} ticket(s)`);
  loadDrafts();
  btn.disabled = false;
  btn.textContent = 'Reject All';
}

function pct(s) { return (s !== null && s !== undefined) ? Math.round(s * 100) + '%' : '—'; }
function repoShort(s) {
  if (!s) return '';
  if (s.startsWith('http')) {
    try { const p = new URL(s).pathname.split('/').filter(Boolean); return '⎇ ' + (p.length >= 2 ? p.slice(-2).join('/') : s); }
    catch { return s; }
  }
  return '📁 ' + (s.split('/').pop() || s);
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  return s ? new Date(s).toLocaleDateString('en-US', {month:'2-digit', day:'2-digit', year:'2-digit'}) : '—';
}
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => el.className = '', 3000);
}

initTheme();
loadDrafts();
</script>
</body>
</html>
