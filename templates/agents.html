{% extends "base.html" %}
{% block title %}Agents — Agent Ticket System{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/pages/insights.css">
<link rel="stylesheet" href="/static/pages/agents.css">
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-wrap">
  <div class="page-hdr">
    <div>
      <h1>Agents</h1>
      <p>LangGraph agents and tools powering the ticket pipeline</p>
    </div>
  </div>

  <section class="section">
    <h2>Pipeline Agents</h2>
    <div id="agent-grid" class="agent-grid"></div>
  </section>

  <section class="section">
    <h2>Tools</h2>
    <div id="tool-list" class="tool-list"></div>
  </section>
</div>

<!-- Code viewer drawer -->
<div id="code-backdrop" class="code-backdrop"></div>
<div id="code-drawer" class="code-drawer">
  <div class="code-drawer-header">
    <span id="code-drawer-file" class="code-drawer-file"></span>
    <button class="code-drawer-close" id="code-drawer-close">✕</button>
  </div>
  <pre id="code-drawer-content" class="code-drawer-pre"></pre>
</div>
{% endblock %}

{% block scripts %}<script src="/static/pages/agents.js"></script>{% endblock %}
