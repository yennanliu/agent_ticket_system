{% extends "base.html" %}
{% block title %}Agent Logs — Agent Ticket System{% endblock %}
{% block head %}<link rel="stylesheet" href="/static/pages/logs.css">{% endblock %}

{% block content %}
<div class="toolbar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="create">Create</button>
  <button class="filter-btn" data-filter="enrich">Enrich</button>
  <button class="filter-btn" data-filter="validate">Validate</button>
  <button class="filter-btn err" data-filter="error">Errors</button>
  <div class="spacer"></div>
  <span class="toolbar-meta"><span class="live-dot"></span>Live · <span id="last-updated">—</span></span>
  <button class="btn-sm" id="refresh-btn">↻ Refresh</button>
  <button class="btn-sm del" id="clear-btn">Clear</button>
</div>

<div id="stat-bar">
  <span>Total: <span class="stat-val" id="stat-total">—</span></span>
  <span>Errors: <span class="stat-val stat-errors" id="stat-errors">—</span></span>
  <span>Avg duration: <span class="stat-val" id="stat-avg">—</span></span>
</div>

<div id="log-container"></div>
{% endblock %}

{% block scripts %}<script src="/static/pages/logs.js"></script>{% endblock %}
